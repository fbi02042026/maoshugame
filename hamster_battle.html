function drawPauseBtn(){
    ctx.fillStyle='rgba(0,0,0,0.45)';
    rRect(G.W-52, 12, 40, 36, 8); ctx.fill();
    ctx.fillStyle='#FFF'; ctx.font='18px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⏸', G.W-32, 30);
}

function drawBtn(x,y,w,h,text,bg,fg){
    ctx.fillStyle=bg; rRect(x,y,w,h,h/2); ctx.fill();
    ctx.fillStyle=fg; ctx.font='bold 17px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(text,x+w/2,y+h/2+1);
}
function drawFloorTile(x,y,w,h){
    const ts=50;
    for(let tx=0;tx<w;tx+=ts) for(let ty=0;ty<h;ty+=ts){
        ctx.fillStyle=((Math.floor(tx/ts)+Math.floor(ty/ts))%2===0)?C.floor1:C.floor2;
        ctx.fillRect(x+tx,y+ty,ts,ts);
    }
}
function drawRatHole(){
    const r=G.ratHole;
    const glow=0.3+0.2*Math.sin(G.time*2);
    ctx.fillStyle=`rgba(255,215,0,${glow})`;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r+10,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.ratHole;
    ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2a1a0a';
    ctx.beginPath(); ctx.ellipse(r.x,r.y,r.r,r.r*0.7,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C.gold; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('鼠洞',r.x,r.y);
}
function drawFurniture(f){
    const img = IMAGES[f.type];
    const cx=f.x+f.w/2, cy=f.y+f.h/2;
    ctx.save();
    ctx.translate(cx, cy);
    if(f.shakeTimer>0){
        const wobble=Math.sin(G.time*38)*f.shakeAngle*(f.shakeTimer/0.45);
        ctx.rotate(wobble);
    }
    if(f.flipX) ctx.scale(-1, 1);
    if(img && img.complete && img.naturalWidth > 0 && !img._failed){
        ctx.drawImage(img, -f.w/2, -f.h/2, f.w, f.h);
    } else {
        const colors = {
            top_stove:{f:'#555',s:'#333'}, top_fridge_white:{f:'#EEE',s:'#CCC'}, top_fridge_blue:{f:'#88BBDD',s:'#6699BB'},
            sofa_lg:{f:C.darkBrown,s:'#6B4914'}, decor_trash:{f:'#888',s:'#666'}, catbed_grey:{f:'#CCC',s:'#999'},
            catbed_pink:{f:'#FFB6C1',s:'#FF69B4'}, catbed_round:{f:'#DDD',s:'#AAA'},
        };
        const cl = colors[f.type] || {f:'#A0825A',s:'#7A6040'};
        ctx.fillStyle=cl.f; rRect(-f.w/2,-f.h/2,f.w,f.h,5); ctx.fill();
        ctx.strokeStyle=cl.s; ctx.lineWidth=2; rRect(-f.w/2,-f.h/2,f.w,f.h,5); ctx.stroke();
    }
    ctx.restore();
    if(f.interactive && !f.decor){
        const ga=0.4+0.3*Math.sin(G.time*3);
        ctx.strokeStyle=`rgba(255,215,0,${ga})`; ctx.lineWidth=3;
        rRect(f.x-2,f.y-2,f.w+4,f.h+4,7); ctx.stroke();
    }
}
function drawFood(food,dropped){
    // 优先用图片素材
    const img = food.type.img ? IMAGES[food.type.img] : null;
    if(img && img.complete && img.naturalWidth > 0 && !img._failed){
        ctx.drawImage(img, food.x-16, food.y-16, 32, 32);
    } else {
        ctx.font='24px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(food.type.icon,food.x,food.y);
    }
    // 静态高亮光边（不闪动）
    if(!dropped && !food.collected){
        ctx.strokeStyle='rgba(255,215,0,0.85)'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(food.x,food.y,18,0,Math.PI*2); ctx.stroke();
    }
    if(food.stealing && G.hamster && G.hamster.stealTarget===food){
        ctx.strokeStyle=C.gold; ctx.lineWidth=4;
        ctx.beginPath(); ctx.arc(food.x,food.y,28,-Math.PI/2,-Math.PI/2+Math.PI*2*G.hamster.stealProgress);
        ctx.stroke();
    }
}
function drawPlacedTrap(tr){
    const td=TRAP_DATA[tr.type];
    ctx.font='26px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(td.icon,tr.x,tr.y);
    ctx.strokeStyle='rgba(255,215,0,0.5)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(tr.x,tr.y,15,0,Math.PI*2); ctx.stroke();
}
function drawPowerups(){
    for(let pw of G.powerups){
        if(pw.collected) continue;
        ctx.save(); ctx.translate(pw.x, pw.y);
        // 闪烁效果
        const glow = 0.6 + 0.4*Math.sin(G.time*4);
        ctx.globalAlpha = glow;
        if(pw.type==='toycar'){
            // 玩具车外观
            ctx.fillStyle='#FF6347';
            ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle='#FF0000'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.arc(0,0,16,0,Math.PI*2); ctx.stroke();
            // 车轮
            ctx.fillStyle='#333';
            ctx.beginPath(); ctx.arc(-8,8,4,0,Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(8,8,4,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#FFF'; ctx.font='bold 10px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('🚗',0,0);
        }
        ctx.restore();
    }
}
function drawHamsterChar(){
    const h=G.hamster;
    if(h.invincible>0 && Math.floor(G.time*10)%2===0) return;
    // 老鼠移动拖尾
    if(h.moving && h.trail) {
        ctx.globalAlpha = 0.35;
        for(let i=0;i<h.trail.length;i++){
            const t=h.trail[i];
            const alpha = 0.35 * (1 - i/h.trail.length);
            ctx.globalAlpha = alpha;
            ctx.fillStyle = C.hamsterBody;
            ctx.beginPath();
            ctx.arc(t.x, t.y, h.r * (1 - i/h.trail.length * 0.3), 0, Math.PI*2);
            ctx.fill();
        }
        ctx.globalAlpha = 1;
    }
    drawHamsterSprite(h.x,h.y,h.r,h.face,h.dir);
    // 玩具车
    if(h.toycarTimer > 0){
        ctx.fillStyle='#FF6347';
        ctx.beginPath(); ctx.arc(h.x, h.y, h.r+4, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle='#FF0000'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(h.x, h.y, h.r+4, 0, Math.PI*2); ctx.stroke();
        ctx.fillStyle='#333';
        ctx.beginPath(); ctx.arc(h.x-5, h.y+h.r-2, 3, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(h.x+5, h.y+h.r-2, 3, 0, Math.PI*2); ctx.fill();
    }
    // 脚底食物格（能量格样式，带食物图标）
    if(G.foodTarget > 0){
        const slotSize=10, gap=3, totalW=(slotSize+gap)*G.foodTarget-gap;
        const sx=h.x-totalW/2, sy=h.y+h.r+5;
        for(let i=0;i<G.foodTarget;i++){
            const x=sx+i*(slotSize+gap);
            if(i<G.foodCollected){
                // 已收集：金色背景+食物图标
                ctx.fillStyle='#FFD700';
                rRect(x,sy,slotSize,slotSize,3); ctx.fill();
                ctx.strokeStyle='#DAA520'; ctx.lineWidth=1;
                rRect(x,sy,slotSize,slotSize,3); ctx.stroke();
                ctx.font='8px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
                ctx.fillText('🍖',x+slotSize/2,sy+slotSize/2+1);
            } else {
                // 未收集：暗色空槽
                ctx.fillStyle='rgba(255,255,255,0.1)';
                rRect(x,sy,slotSize,slotSize,3); ctx.fill();
                ctx.strokeStyle='rgba(255,255,255,0.2)'; ctx.lineWidth=1;
                rRect(x,sy,slotSize,slotSize,3); ctx.stroke();
            }
        }
    }
}
// 浮动文字效果（+1, +2等）
function drawFloatTexts(dt){
    for(let i=G.floatTexts.length-1;i>=0;i--){
        const ft=G.floatTexts[i];
        ft.timer-=dt;
        if(ft.timer<=0){G.floatTexts.splice(i,1);continue;}
        const progress=1-ft.timer/ft.maxTimer;
        const alpha=1-progress;
        const offsetY=-20-progress*25; // 向上浮动
        const scale=1+progress*0.3; // 略微放大
        ctx.save();
        ctx.globalAlpha=alpha;
        ctx.fillStyle=ft.color;
        ctx.font=`bold ${Math.floor(14*scale)}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(ft.text,ft.x,ft.y+offsetY);
        ctx.restore();
    }
}
function drawHamsterSprite(x,y,r,face,dir){
    ctx.save(); ctx.translate(x,y);
    // 失败画面：mouse_fail1 ↔ mouse_fail2 自然交替
    if(G.scene==='result' && G.stars===0){
        const h=G.hamster;
        const failImg = (h && h.failVariant===1) ? IMAGES.mouseFail2 : IMAGES.mouseFail1;
        if(failImg && failImg.complete && !failImg._failed){
            const targetH = r * 2.8;
            const scale = targetH / failImg.naturalHeight;
            const targetW = failImg.naturalWidth * scale;
            ctx.drawImage(failImg, -targetW/2, -targetH/2, targetW, targetH);
            ctx.restore();
            return;
        }
    } else if(IMAGES.mouse && IMAGES.mouse.complete && !IMAGES.mouse._failed){
        const img=IMAGES.mouse;
        const targetH = r * 2.8;
        const scale = targetH / img.naturalHeight;
        const targetW = img.naturalWidth * scale;
        if(dir===2) ctx.scale(-1,1);
        ctx.drawImage(img, -targetW/2, -targetH/2, targetW, targetH);
    } else {
        // 身体
        ctx.fillStyle=C.hamsterBody; ctx.strokeStyle='#333'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,0,r,0,Math.PI*2); ctx.fill(); ctx.stroke();
        // 耳朵
        ctx.fillStyle=C.hamsterBody;
        ctx.beginPath(); ctx.arc(-r*0.6,-r*0.7,r*0.4,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.beginPath(); ctx.arc(r*0.6,-r*0.7,r*0.4,0,Math.PI*2); ctx.fill(); ctx.stroke();
        ctx.fillStyle=C.hamsterEar;
        ctx.beginPath(); ctx.arc(-r*0.6,-r*0.7,r*0.2,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(r*0.6,-r*0.7,r*0.2,0,Math.PI*2); ctx.fill();
        // 眼睛
        ctx.fillStyle='#333';
        const ox=dir===2?-2:dir===3?2:0, oy=dir===1?-2:dir===0?2:0;
        ctx.beginPath(); ctx.arc(-r*0.3+ox,-r*0.15+oy,r*0.14,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(r*0.3+ox,-r*0.15+oy,r*0.14,0,Math.PI*2); ctx.fill();
        // 表情
        if(face==='alert'||face==='surprise'){
            ctx.fillStyle='#FF8888';
            ctx.beginPath(); ctx.arc(ox,r*0.35,r*0.2,0,Math.PI*2); ctx.fill();
        } else if(face==='happy'){
            ctx.strokeStyle='#333'; ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.arc(0,r*0.25,r*0.2,0.1*Math.PI,0.9*Math.PI); ctx.stroke();
        }
        // 鼻子
        ctx.fillStyle='#FFB6C1';
        ctx.beginPath(); ctx.arc(ox,r*0.12,r*0.08,0,Math.PI*2); ctx.fill();
        // 腮红
        ctx.fillStyle='rgba(255,182,193,0.3)';
        ctx.beginPath(); ctx.arc(-r*0.5,r*0.15,r*0.15,0,Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(r*0.5,r*0.15,r*0.15,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
}
function drawCat(){
    const c=G.cat;
    // 警戒圈（睡觉时也显示，但不显示视野锥）
    ctx.strokeStyle = c.alertValue > 50 ? 'rgba(255,68,68,0.4)' : 'rgba(255,165,0,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([6,4]);
    ctx.beginPath(); ctx.arc(c.x,c.y,CAT_VISION_RANGE,0,Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // 视野锥（睡觉/吃惊/愣住时不显示）
    if(c.state!=='sleeping' && c.state!=='surprised' && c.state!=='charging'){
        const targetAngle = getCatFacingAngle(c);
        if(c._smoothAngle == null) c._smoothAngle = targetAngle;
        const diff = normalizeAngle(targetAngle - c._smoothAngle);
        c._smoothAngle = normalizeAngle(c._smoothAngle + diff * 0.15);
        const halfAngle = CAT_VISION_ANGLE / 2;
        ctx.save();
        ctx.globalAlpha = c.state==='chase' ? 0.25 : 0.20;
        ctx.fillStyle = c.state==='chase' ? '#FF2222' : '#FF6600';
        ctx.beginPath();
        ctx.moveTo(c.x, c.y);
        ctx.arc(c.x, c.y, CAT_VISION_RANGE, c._smoothAngle-halfAngle, c._smoothAngle+halfAngle);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.restore();
    }
    ctx.save(); ctx.translate(c.x,c.y);
    // 睡觉 ZZZ 特效
    if(c.state==='sleeping'){
        const zzOffset = Math.sin(G.time*2)*3;
        ctx.font='bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillStyle='#88AAFF';
        ctx.fillText('Z', c.r+8, -c.r-18+zzOffset);
        ctx.font='bold 12px sans-serif';
        ctx.fillText('z', c.r+18, -c.r-26+zzOffset*0.7);
        ctx.font='bold 10px sans-serif';
        ctx.fillText('z', c.r+26, -c.r-32+zzOffset*0.5);
    }
    // 警觉可视化
    if(c.state==='chase' || c.alertValue >= 100){
        const scale = 1 + Math.sin(G.time*8)*0.25;
        const fy = -c.r - 26;
        ctx.save(); ctx.translate(0, fy); ctx.scale(scale, scale);
        ctx.font = 'bold 32px sans-serif'; ctx.fillStyle = '#FF4444';
        ctx.strokeStyle = '#880000'; ctx.lineWidth = 3;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.strokeText('!', 0, 0); ctx.fillText('!', 0, 0);
        ctx.restore();
        if(c.chaseBuildup < 1.5 || (c.alertValue >= 100 && c.alertValue < 105)){
            ctx.font = 'bold 15px sans-serif'; ctx.fillStyle = '#FF6666';
            ctx.strokeStyle = '#880000'; ctx.lineWidth = 2;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.strokeText('喵!', 0, -c.r - 52); ctx.fillText('喵!', 0, -c.r - 52);
        }
    } else if(c.alertValue > 15){
        const bounce = Math.sin(G.time*5)*3, fy = -c.r - 24 + bounce;
        ctx.font = 'bold 26px sans-serif'; ctx.fillStyle = '#FFA500';
        ctx.strokeStyle = '#CC6600'; ctx.lineWidth = 3;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.strokeText('?', 0, fy); ctx.fillText('?', 0, fy);
    } else if(c.alertValue > 5){
        const bounce = Math.sin(G.time*4)*2, fy = -c.r - 22 + bounce;
        ctx.font = 'bold 22px sans-serif'; ctx.fillStyle = '#FFD700';
        ctx.strokeStyle = '#8B6914'; ctx.lineWidth = 3;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.strokeText('?', 0, fy); ctx.fillText('?', 0, fy);
    }
    // 烟雾：蓄力大量冒烟 / 追逐冒烟
    if(c.state==='charging'){
        let fx=c.targetVx||c.vx, fy=c.targetVy||c.vy;
        if(Math.hypot(fx,fy)<0.01){ fx=1; fy=0; }
        for(let i=0;i<8;i++){
            const offset=i*8;
            const sx=-fx*(c.r+8+offset)+(Math.random()-0.5)*14;
            const sy=-fy*(c.r+8+offset)+(Math.random()-0.5)*14;
            const alpha=0.35+0.15*(8-i)/8;
            ctx.fillStyle=`rgba(180,180,180,${alpha})`;
            ctx.beginPath();
            ctx.arc(sx,sy,12-i*0.8,0,Math.PI*2);
            ctx.fill();
        }
    } else if(c.state==='chase'){
        const inSmokePhase = c.chaseBuildup < CAT_CHASE_SMOKE_TIME;
        const speedRatio = c.chaseSpeed > 0 ? Math.min(1, c.curSpd / c.chaseSpeed) : 0;
        const showSmoke = inSmokePhase || speedRatio > 0.05;
        if(showSmoke){
            let fx=c.vx, fy=c.vy;
            if(Math.hypot(fx,fy)<0.01){ fx=c.targetVx; fy=c.targetVy; }
            if(Math.hypot(fx,fy)<0.01){ fx=1; fy=0; }
            const smokeIntensity = inSmokePhase ? 0.7 : speedRatio;
            const smokeSize = inSmokePhase ? 10 : 4 + speedRatio * 10;
            const smokeAlpha = 0.25 + smokeIntensity * 0.35;
            const backX = -fx * (c.r + 5);
            const backY = -fy * (c.r + 5);
            for(let i=0; i<(inSmokePhase ? 4 : 3); i++){
                const offset = i * 6;
                const sx = backX - fx * offset + (Math.random()-0.5)*8;
                const sy = backY - fy * offset + (Math.random()-0.5)*8;
                ctx.fillStyle = `rgba(200,200,200,${smokeAlpha * (1-i*0.2)})`;
                ctx.beginPath();
                ctx.arc(sx, sy, smokeSize * (1-i*0.15), 0, Math.PI*2);
                ctx.fill();
            }
        }
    }
    // 猫图片
    const imgKey = c.catImg || 'catAlert1';
    const img = IMAGES[imgKey];
    if(img && img.complete && !img._failed){
        const targetH = c.r * 3.0;
        const scale = targetH / img.naturalHeight;
        const targetW = img.naturalWidth * scale;
        if(c.dir===2) ctx.scale(-1,1);
        ctx.drawImage(img, -targetW/2, -targetH/2, targetW, targetH);
    } else {
        // fallback: canvas绘制
        ctx.fillStyle=C.catBody; ctx.strokeStyle='#333'; ctx.lineWidth=2;
        ctx.beginPath(); ctx.arc(0,0,c.r,0,Math.PI*2); ctx.fill(); ctx.stroke();
    }
    ctx.restore();
}
function drawJoystick(){
    const jx=G.W/2,jy=G.H-140,jr=48;
    ctx.fillStyle='rgba(255,255,255,0.12)';
    ctx.beginPath(); ctx.arc(jx,jy,jr,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.25)'; ctx.lineWidth=2; ctx.stroke();
    const hx=jx+G.touchJoy.dx, hy=jy+G.touchJoy.dy;
    ctx.fillStyle='rgba(255,255,255,0.35)';
    ctx.beginPath(); ctx.arc(hx,hy,20,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.55)'; ctx.lineWidth=2; ctx.stroke();
}
function drawCatIndicator(){
    const c=G.cat; if(!c||!G.hamster) return;
    const z=G.camera.zoom;
    const sx=(c.x-G.camera.x)*z+G.W/2, sy=(c.y-G.camera.y)*z+G.H/2;
    if(sx>30&&sx<G.W-30&&sy>60&&sy<G.H-30) return;
    const a=Math.atan2(sy-G.H/2,sx-G.W/2);
    const m=42;
    let ix=G.W/2+Math.cos(a)*(G.W/2-m), iy=G.H/2+Math.sin(a)*(G.H/2-m);
    ix=clamp(ix,m,G.W-m); iy=clamp(iy,m+40,G.H-m);
    ctx.save(); ctx.translate(ix,iy); ctx.rotate(a);
    ctx.fillStyle='rgba(245,166,35,0.85)';
    ctx.beginPath(); ctx.moveTo(20,0); ctx.lineTo(-10,-13); ctx.lineTo(-6,0); ctx.lineTo(-10,13); ctx.closePath(); ctx.fill();
    ctx.rotate(-a); ctx.font='16px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('🐱',0,2);
    ctx.restore();
}

// ============================================================
// 游戏循环
// ============================================================
function gameLoop(ts){
    if(!G.lastTime) G.lastTime=ts;
    G.dt=Math.min((ts-G.lastTime)/1000,0.05);
    G.lastTime=ts;
    if(!G.paused) update(G.dt);
    render();
    requestAnimationFrame(gameLoop);
}

resizeCanvas();
setupInput();
requestAnimationFrame(gameLoop);
</script>
