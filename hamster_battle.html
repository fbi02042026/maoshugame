const SFX = {
    ctx: null,
    init() {
        try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    },
    play(type) {
        if(!this.ctx) return;
        try {
            const now = this.ctx.currentTime;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            switch(type) {
                case 'collect':
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.linearRampToValueAtTime(784, now+0.1);
                    osc.frequency.linearRampToValueAtTime(1047, now+0.2);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now+0.3);
                    osc.start(now); osc.stop(now+0.3);
                    break;
                case 'alert':
                    osc.frequency.setValueAtTime(330, now);
                    osc.frequency.linearRampToValueAtTime(220, now+0.2);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.linearRampToValueAtTime(0, now+0.3);
                    osc.start(now); osc.stop(now+0.3);
                    break;
                case 'hit':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(200, now);
                    osc.frequency.linearRampToValueAtTime(80, now+0.15);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now+0.2);
                    osc.start(now); osc.stop(now+0.2);
                    break;
                case 'stun':
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(400, now);
                    osc.frequency.linearRampToValueAtTime(150, now+0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now+0.4);
                    osc.start(now); osc.stop(now+0.4);
                    break;
                case 'win':
                    osc.frequency.setValueAtTime(523, now);
                    osc.frequency.linearRampToValueAtTime(659, now+0.15);
                    osc.frequency.linearRampToValueAtTime(784, now+0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now+0.5);
                    osc.start(now); osc.stop(now+0.5);
                    break;
                case 'lose':
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(300, now);
                    osc.frequency.linearRampToValueAtTime(100, now+0.4);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.linearRampToValueAtTime(0, now+0.5);
                    osc.start(now); osc.stop(now+0.5);
                    break;
                case 'powerup':
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.linearRampToValueAtTime(880, now+0.15);
                    osc.frequency.linearRampToValueAtTime(1320, now+0.3);
                    gain.gain.setValueAtTime(0.2, now);
                    gain.gain.linearRampToValueAtTime(0, now+0.35);
                    osc.start(now); osc.stop(now+0.35);
                    break;
            }
        } catch(e) {}
    }
};

// ============================================================
// 工具
// ============================================================
function dist(a,b){ return Math.hypot(a.x-b.x, a.y-b.y); }
function clamp(v,mn,mx){ return Math.max(mn,Math.min(mx,v)); }
function normalizeAngle(a){ while(a>Math.PI) a-=Math.PI*2; while(a<-Math.PI) a+=Math.PI*2; return a; }
function lerp(a,b,t){ return a+(b-a)*t; }
function rand(a,b){ return a+Math.random()*(b-a); }
function randInt(a,b){ return Math.floor(rand(a,b+1)); }
function circRectHit(cx,cy,cr,rx,ry,rw,rh){
    let nx=clamp(cx,rx,rx+rw), ny=clamp(cy,ry,ry+rh);
    return (cx-nx)**2+(cy-ny)**2 < cr*cr;
}
// 视线检测：猫到老鼠之间是否有障碍物阻挡
function hasLineOfSight(x1,y1,x2,y2){
    const steps = 10;
    const dx=(x2-x1)/steps, dy=(y2-y1)/steps;
    for(let i=1;i<steps;i++){
        const px=x1+dx*i, py=y1+dy*i;
        for(let f of G.furniture){
            if(f.interactive && circRectHit(px,py,2,f.x,f.y,f.w,f.h)) return false;
        }
    }
    return true;
}
// 猫面朝方向（速度为0时用 dir 推算）
function getCatFacingAngle(c){
    const len = Math.hypot(c.vx, c.vy);
    if(len > 0.05) return Math.atan2(c.vy, c.vx);
    const dirs = [Math.PI/2, -Math.PI/2, Math.PI, 0]; // 下/上/左/右
    return dirs[c.dir] || 0;
}
// 猫视野锥检测：老鼠是否在猫面朝方向的扇形区域内
function isInCatVisionCone(c,h){
    const dx=h.x-c.x, dy=h.y-c.y;
    const d=Math.hypot(dx,dy);
    if(d>CAT_VISION_RANGE) return false;
    const catAngle = getCatFacingAngle(c);
    const targetAngle = Math.atan2(dy, dx);
    let diff = targetAngle - catAngle;
    while(diff > Math.PI) diff -= Math.PI*2;
    while(diff < -Math.PI) diff += Math.PI*2;
    return Math.abs(diff) < CAT_VISION_ANGLE / 2; // 90°扇形
}
// 警戒条增长速率：越近越快，贴着猫约4秒满
function calcAlertGain(c, h, d, hiding){
    if(d >= CAT_VISION_RANGE) return 0;
    const touchDist = c.r + h.r + 2;
    const t = clamp((CAT_VISION_RANGE - d) / Math.max(1, CAT_VISION_RANGE - touchDist), 0, 1);
    let rate = lerp(3, 25, t); // 贴着猫 25/s → 4s 满
    if(hiding) rate *= 0.15;
    if(isInCatVisionCone(c, h)) rate *= 1.3;
    return rate;
}
function wakeCatSurprised(c){
    if(c.state==='surprised' || c.state==='charging' || c.state==='chase') return;
    c.state='surprised';
    c.face='surprised';
    c.surprisedTimer=CAT_SURPRISE_TIME;
    c.catImg='catSurprise';
    c.targetSpd=0; c.curSpd=0;
    c.hasSeenHamster=true;
    c.committedChase=true;
    if(c.firstChase){
        G.sageHint={text:'猫醒了！快跑！',timer:3.0};
        c.firstChase=false;
    }
}
function startCatChase(c, h){
    c.state='chase';
    c.face='chase';
    c.chaseBuildup=CAT_CHASE_SMOKE_TIME; // 跳过烟雾，直接进入加速段
    c.targetSpd=0;
    c.curSpd=0;
    c.hasSeenHamster=true;
    if(h){
        const d=dist(c,h);
        const dx=h.x-c.x, dy=h.y-c.y;
        const len=Math.hypot(dx,dy);
        if(len>0.01){ c.vx=dx/len; c.vy=dy/len; c.targetVx=c.vx; c.targetVy=c.vy; }
    }
}
function pushOut(cx,cy,cr,rx,ry,rw,rh){
    let nx=clamp(cx,rx,rx+rw), ny=clamp(cy,ry,ry+rh);
    let dx=cx-nx, dy=cy-ny, d=Math.hypot(dx,dy);
    if(d<cr && d>0.01){ let p=cr-d; return {x:cx+dx/d*p, y:cy+dy/d*p}; }
    // 圆心在矩形内部：推向最近的边
    if(d<0.01){
        const dL=cx-rx, dR=rx+rw-cx, dT=cy-ry, dB=ry+rh-cy;
        const minD=Math.min(dL,dR,dT,dB);
        if(minD===dL) return {x:rx-cr, y:cy};
        if(minD===dR) return {x:rx+rw+cr, y:cy};
        if(minD===dT) return {x:cx, y:ry-cr};
        return {x:cx, y:ry+rh+cr};
    }
    return {x:cx,y:cy};
}
// 检测老鼠是否躲在家具内部（interactive家具）
function isHamsterHiding(){
    const h=G.hamster;
    if(!h) return false;
    for(let f of G.furniture){
        if(f.interactive && f.hideable!==false && h.x>f.x && h.x<f.x+f.w && h.y>f.y && h.y<f.y+f.h){
            return true;
        }
    }
    return false;
}
function rRect(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
}
function btnHit(bx,by,bw,bh,px,py){
    return px>=bx && px<=bx+bw && py>=by && py<=by+bh;
}
function wrapTextLines(text, maxWidth, font){
    ctx.font = font;
    const lines = [];
    let line = '';
    for(let i=0; i<text.length; i++){
        const ch = text[i];
        if(ch === '\n'){ lines.push(line); line = ''; continue; }
        const test = line + ch;
        if(line && ctx.measureText(test).width > maxWidth){
            lines.push(line);
            line = ch;
        } else {
            line = test;
        }
    }
    if(line) lines.push(line);
    return lines;
}
function drawTextBox(text, bx, by, bw, minBh, font, color, pad){
    const maxW = bw - pad * 2;
    const lines = wrapTextLines(text, maxW, font);
    const lineH = Math.ceil(parseInt(font, 10) * 1.4) || 20;
    const bh = Math.max(minBh, lines.length * lineH + pad * 2);
    ctx.fillStyle='rgba(255,255,255,0.92)';
    rRect(bx, by, bw, bh, 15); ctx.fill();
    ctx.strokeStyle=C.darkBrown; ctx.lineWidth=2; rRect(bx, by, bw, bh, 15); ctx.stroke();
    ctx.fillStyle = color;
    ctx.font = font;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const startY = by + bh/2 - (lines.length - 1) * lineH / 2;
    for(let i=0; i<lines.length; i++){
        ctx.fillText(lines[i], bx + bw/2, startY + i * lineH);
    }
    return bh;
}

function tickCatAbandon(c,h,d,dt){
    if(!c.committedChase) return false;
    const lv=LEVELS[G.currentLevel-1];
    const outOfAlert = d > CAT_VISION_RANGE;
    if(outOfAlert){
        c.alertValue -= lv.alertSpeed * 5 * dt;
    } else {

    }
    c.alertValue = clamp(c.alertValue, 0, 100);
    if(c.alertValue <= CAT_ALERT_RETURN){
        c.state='returning';
        c.committedChase=false;
        c.dashTimer=0;
        c.chargeTimer=0;
        c.wakeCharge=false;
        return true;
    }
    return false;
}
function catDeflectFromWall(c,nx,ny){
    const tx1=-ny, ty1=nx, tx2=ny, ty2=-nx;
    const dot1=c.vx*tx1+c.vy*ty1, dot2=c.vx*tx2+c.vy*ty2;
    const dx=Math.abs(dot1)>=Math.abs(dot2)?tx1:tx2;
    const dy=Math.abs(dot1)>=Math.abs(dot2)?ty1:ty2;
    c.avoidUntil=G.time+1.0;
    c.avoidVx=dx; c.avoidVy=dy;
    c.vx=dx; c.vy=dy; c.targetVx=dx; c.targetVy=dy;
    c.collCooldown=0.65;
    c.curSpd=Math.min(c.curSpd*0.35, c.patrolSpeed*0.6);
}
function getCatChaseTarget(c,h){
    if(!h) return {x:c.x,y:c.y};
    if(hasLineOfSight(c.x,c.y,h.x,h.y)) return {x:h.x,y:h.y};
    if(G.catPaths && G.catPaths.length){
        const g=G.catPaths[0];
        const gx=g.x+g.w/2, gy=g.y+g.h/2;
        if(dist(c,{x:gx,y:gy})>20) return {x:gx,y:gy};
    }
    return {x:h.x,y:h.y};
}
function catDeflectFromFurniture(c,f){
    const fcx=f.x+f.w/2, fcy=f.y+f.h/2;
    let ax=c.x-fcx, ay=c.y-fcy;
    let aLen=Math.hypot(ax,ay);
    if(aLen<0.01){ ax=1; ay=0; aLen=1; }
    ax/=aLen; ay/=aLen;
    const tx1=-ay, ty1=ax, tx2=ay, ty2=-ax;
    const dot1=c.vx*tx1+c.vy*ty1, dot2=c.vx*tx2+c.vy*ty2;
    const dx=Math.abs(dot1)>=Math.abs(dot2)?tx1:tx2;
    const dy=Math.abs(dot1)>=Math.abs(dot2)?ty1:ty2;
    c.avoidUntil=G.time+0.9;
    c.avoidVx=dx; c.avoidVy=dy;
    c.vx=dx; c.vy=dy;
    c.targetVx=dx; c.targetVy=dy;
    c.collCooldown=0.55;
    c.curSpd=Math.min(c.curSpd*0.35, c.patrolSpeed*0.5);
}
