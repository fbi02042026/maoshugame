function genPatrolPts(){
    const pts=[];
    // 优先在食物附近生成巡逻点，让猫在食物区域巡逻而不是直接朝老鼠走
    const uncollectedFoods = G.foods.filter(f=>!f.collected);
    const foodTargets = uncollectedFoods.length > 0 ? uncollectedFoods : G.foods;
    // 先生成食物附近的巡逻点
    for(let food of foodTargets){
        if(pts.length>=6) break;
        // 在食物周围随机偏移
        const angle = Math.random()*Math.PI*2;
        const dist = 60 + Math.random()*100;
        const px = food.x + Math.cos(angle)*dist;
        const py = food.y + Math.sin(angle)*dist;
        if(px>50 && px<G.mapW-50 && py>50 && py<G.mapH-100){
            pts.push({x:px,y:py});
        }
    }
    // 补充随机点
    let attempts=0;
    while(pts.length<6 && attempts<200){
        attempts++;
        const px=rand(80,G.mapW-80), py=rand(80,G.mapH-180);
        let inside=false;
        for(let f of G.furniture){
            if(px>f.x-10 && px<f.x+f.w+10 && py>f.y-10 && py<f.y+f.h+10){inside=true;break;}
        }
        if(!inside){
            for(let t of G.placedTraps){
                if(Math.hypot(px-t.x,py-t.y)<25){inside=true;break;}
            }
        }
        if(!inside) pts.push({x:px,y:py});
    }
    // 保底
    while(pts.length<6) pts.push({x:rand(100,G.mapW-100), y:rand(100,G.mapH-200)});
    return pts;
}

// ============================================================
// 猫AI V2 - 全新警觉系统
// ============================================================
// alertValue规则（非chase状态）：
//   - 距离<500: 越近涨越快，躲藏时涨速x0.15
//   - 距离>=500: 慢慢下降
// chase状态：不依赖alertValue，只基于距离追击/追丢
// alertValue>=100: 强制发现（即使躲藏）

function updateCat(dt){
    const c=G.cat, h=G.hamster;
    if(!c||!h) return;
    c.animT += dt;
    if(c.stateTimer>0) c.stateTimer -= dt;
    const d=dist(c,h), lv=LEVELS[G.currentLevel-1];
    const hiding = isHamsterHiding();

    // 仙人提示期间：猫只换表情，不移动（玩家此时也不能动）
    if(G.sageHint && G.sageHint.timer > 0){
        c.targetSpd=0; c.curSpd=0;
        updateCatImg(c, dt);
        return;
    }

    // 状态切换检测（用于起跑效果）
    c.lastState = c.state;

    // 警戒条：靠近猫慢慢涨，满了醒（睡觉/巡逻/懒等状态均适用）
    const faceDist = c.r + h.r + CAT_FACE_WAKE_DIST;
    if(c.state !== 'chase' && c.state !== 'surprised' && c.state !== 'stunned' && c.state !== 'confused'){
        if(d <= faceDist && (c.state==='sleeping' || c.state==='lazy' || c.state==='patrol')){
            c.alertValue = 100;
        } else if(d < CAT_VISION_RANGE) {
            c.alertValue += calcAlertGain(c, h, d, hiding) * dt;
        } else {
            c.alertValue -= lv.alertSpeed * 0.5 * dt;
        }
    }
    // chase状态下警戒由 tickCatAbandon 管理
    // confused状态下alertValue由case内部处理下降

    c.lastState = c.state; // 记录上一帧状态用于检测状态变化

    // 卡住检测：猫1.5秒内移动距离<15px，强制重新找路
    if(c.state==='patrol' || c.state==='chase' || c.state==='charging' || c.state==='returning' || c.state==='alert' || c.state==='stunned' || c.state==='confused' || c.state==='surprised' || c.state==='lazy'){
        // 注意：不包含 'sleeping' - 睡觉时跳过卡住检测
        const dx=c.x-c.stuckX, dy=c.y-c.stuckY;
        c.stuckTimer += dt;
        if(c.stuckTimer > 1.5){
            const moved=Math.hypot(dx,dy);
            if(moved < 15){
                // 猫卡住了，找最近的空隙方向
                let bestDir=null, bestGap=0;
                const testDirs=[
                    {vx:1,vy:0},{vx:-1,vy:0},{vx:0,vy:1},{vx:0,vy:-1},
                    {vx:0.707,vy:0.707},{vx:-0.707,vy:0.707},{vx:0.707,vy:-0.707},{vx:-0.707,vy:-0.707}
                ];
                for(let dir of testDirs){
                    let clear=true, dist=0;
                    for(let step=10; step<=80; step+=10){
                        const tx=c.x+dir.vx*step, ty=c.y+dir.vy*step;
                        for(let f of G.furniture){
                            if(f.interactive && circRectHit(tx,ty,c.r,f.x,f.y,f.w,f.h)){clear=false;break;}
                        }
                        if(!clear) break;
                        for(let w of G.walls){
                            if(circRectHit(tx,ty,c.r,w.x,w.y,w.w,w.h)){clear=false;break;}
                        }
                        if(!clear) break;
                        dist=step;
                    }
                    if(dist>bestGap){bestGap=dist; bestDir=dir;}
                }
                if(c.state==='patrol'){
                    // 巡逻时卡住：在通畅方向中选最接近食物方向的 + 随机偏移
                    let targetX=G.mapW/2, targetY=G.mapH/2;
                    const food=G.foods && G.foods.find(f=>!f.collected);
                    if(food){ targetX=food.x; targetY=food.y; }
                    const foodAngle=Math.atan2(targetY-c.y, targetX-c.x);
                    // 收集所有通畅方向（gap>30）
                    const clearDirs=[];
                    for(let dir of testDirs){
                        let clear=true, dist=0;
                        for(let step=10; step<=80; step+=10){
                            const tx=c.x+dir.vx*step, ty=c.y+dir.vy*step;
                            for(let f of G.furniture){
                                if(f.interactive && circRectHit(tx,ty,c.r,f.x,f.y,f.w,f.h)){clear=false;break;}
                            }
                            if(!clear) break;
                            for(let w of G.walls){
                                if(circRectHit(tx,ty,c.r,w.x,w.y,w.w,w.h)){clear=false;break;}
                            }
                            if(!clear) break;
                            dist=step;
                        }
                        if(dist>30) clearDirs.push({dir, dist, angle:Math.atan2(dir.vy,dir.vx)});
                    }
                    let finalAngle;
                    if(clearDirs.length>0){
                        // 选最接近食物方向 + 小随机偏移
                        clearDirs.sort((a,b)=>{
                            const da=Math.abs(normalizeAngle(a.angle-foodAngle));
                            const db=Math.abs(normalizeAngle(b.angle-foodAngle));
                            return da-db;
                        });
                        const best=clearDirs[0];
                        const offset=(Math.random()-0.5)*0.6; // ±30度小偏移
                        finalAngle=best.angle+offset;
                    } else {
                        // 没有通畅方向，完全随机
                        finalAngle=Math.random()*Math.PI*2;
                    }
                    c.vx=Math.cos(finalAngle); c.vy=Math.sin(finalAngle);
                    c.targetVx=c.vx; c.targetVy=c.vy;
                    c.patrolRandomAngle=finalAngle;
                    c.patrolRandomTimer=rand(0.8, 2.0); // 随机走一段
                    c.curSpd = Math.max(c.curSpd, c.patrolSpeed);
                } else if(bestDir && bestGap>30){
                    c.vx=bestDir.vx; c.vy=bestDir.vy; c.targetVx=bestDir.vx; c.targetVy=bestDir.vy;
                    c.curSpd = Math.max(c.curSpd, c.patrolSpeed);
                } else if(c.state==='chase' || c.state==='alert'){
                    // 追逐中卡住：绕开老鼠，从侧面接近
                    const h=G.hamster;
                    if(h){
                        const tox=h.x-c.x, toy=h.y-c.y;
                        const toLen=Math.hypot(tox,toy);
                        if(toLen>0.01){
                            const r=Math.random()>0.5?1:-1;
                            c.vx=(tox*r - toy)/Math.SQRT2/toLen;
                            c.vy=(toy*r + tox)/Math.SQRT2/toLen;
                            c.targetVx=c.vx; c.targetVy=c.vy;
                        }
                    }
                } else {
                    // 眩晕/困惑中卡住：强制换方向
                    c.state='patrol'; c.patrolPts=genPatrolPts(); c.patrolIdx=0;
                    if(c.patrolPts.length>0){
                        const pt=c.patrolPts[0];
                        const pdx=pt.x-c.x, pdy=pt.y-c.y;
                        const pLen=Math.hypot(pdx,pdy);
                        if(pLen>0.01){c.vx=pdx/pLen; c.vy=pdy/pLen; c.targetVx=c.vx; c.targetVy=c.vy;}
                    }
                }
            }
            c.stuckX=c.x; c.stuckY=c.y; c.stuckTimer=0;
        }
    } else {
        c.stuckTimer=0; c.stuckX=c.x; c.stuckY=c.y;
    }

    switch(c.state){
    case 'sleeping':
        c.face='sleeping';
        c.targetSpd = 0;
        c.catImg = 'catSleep';
        if(c.alertValue >= 100){
            wakeCatSurprised(c);
        } else if(c.stateTimer <= 0 && G.currentLevel !== 1){
            c.state='lazy'; c.stateTimer=rand(6,10);
        }
        break;

    case 'lazy':
        c.face='normal';
        c.targetSpd = c.patrolSpeed * 0.3;
        if((Math.abs(c.curSpd)<0.1) || Math.random()<0.02){
            c.wanderAngle = Math.random() * Math.PI * 2;
            c.targetVx = Math.cos(c.wanderAngle); c.targetVy = Math.sin(c.wanderAngle);
        }
        if(c.alertValue >= 100){ wakeCatSurprised(c); }
        else if(c.alertValue > 15){ c.state='alert'; c.face='alert'; }
        else if(c.stateTimer <= 0){ c.state='patrol'; c.patrolPts=genPatrolPts(); c.patrolIdx=0; }
        break;

    case 'patrol':
        c.face='normal';
        if(!c.patrolPts.length) c.patrolPts=genPatrolPts();
        if(c.alertValue >= 100){ wakeCatSurprised(c); break; }
        if(c.alertValue > 15){ c.state='alert'; c.face='alert'; break; }
        // 正常巡逻
        if(c.patrolRandomTimer > 0){
            // 随机偏移模式：朝食物方向+随机偏移走一段
            c.patrolRandomTimer -= dt;
            c.targetSpd = c.patrolSpeed;
            const tx = c.x + Math.cos(c.patrolRandomAngle) * 100;
            const ty = c.y + Math.sin(c.patrolRandomAngle) * 100;
            catMove(c, tx, ty, dt);
        } else if(c.patrolIdx < c.patrolPts.length){
            const t = c.patrolPts[c.patrolIdx];
            const td = dist(c,t);
            if(td < 30){
                c.targetSpd = 0;
                if(c.curSpd < 0.1){
                    c.patrolIdx++;
                    if(c.patrolIdx >= c.patrolPts.length){c.patrolPts=genPatrolPts();c.patrolIdx=0;}
                }
            } else {
                c.targetSpd = c.patrolSpeed;
                catMove(c,t.x,t.y,dt);
            }
        }
        break;

    case 'alert':
        c.face='alert';
        if(c.alertValue >= 100){ wakeCatSurprised(c); break; }
        if(c.alertValue <= 8){ c.state='patrol'; c.patrolPts=genPatrolPts(); c.patrolIdx=0; c.face='normal'; break; }
        c.targetSpd = c.patrolSpeed * 1.0;
        if(c.hasSeenHamster){
            catMove(c,h.x,h.y,dt);
        } else {
            c.wanderAngle += (Math.random()-0.5)*0.5*dt;
            c.targetVx=Math.cos(c.wanderAngle); c.targetVy=Math.sin(c.wanderAngle);
        }
        break;

    case 'surprised':
        c.face='surprised';
        c.targetSpd = 0;
        c.catImg='catSurprise';
        c.surprisedTimer -= dt;
        if(c.surprisedTimer <= 0){
            c.state='charging';
            c.chargeTimer=0;
            c.wakeCharge=true;
            c.face='chase';
        }
        break;

    case 'charging':
        c.face='chase';
        c.targetSpd=0;
        c.curSpd=Math.max(0, c.curSpd - dt*3);
        c.chargeTimer=(c.chargeTimer||0)+dt;
        { const ct=getCatChaseTarget(c,h); catMove(c,ct.x,ct.y,dt); }
        const chargeLimit = c.wakeCharge ? CAT_WAKE_CHARGE_TIME : CAT_CHARGE_TIME;
        if(c.chargeTimer>=chargeLimit){
            if(c.wakeCharge){
                c.wakeCharge=false;
                c.chargeTimer=0;
                startCatChase(c,h);
                break;
            }
            c.state='chase';
            c.dashTimer=CAT_DASH_TIME;
            c.chargeCooldown=4.5;
            c.chargeTimer=0;
            const ct=getCatChaseTarget(c,h);
            const dx=ct.x-c.x, dy=ct.y-c.y, len=Math.hypot(dx,dy);
            if(len>0.01){ c.vx=dx/len; c.vy=dy/len; c.targetVx=c.vx; c.targetVy=c.vy; }
            c.targetSpd=c.chaseSpeed*1.45;
            c.curSpd=c.chaseSpeed*1.25;
        }
        break;

    case 'returning':
        c.face='normal';
        { const bed=getCatBedPos();
        if(bed){
            catMove(c,bed.x,bed.y,dt);
            c.targetSpd=c.patrolSpeed;
            if(dist(c,bed)<45){
                c.state=G.currentLevel===1?'sleeping':'lazy';
                c.stateTimer=G.currentLevel===1?15:8;
                c.alertValue=0; c.hasSeenHamster=false;
                c.targetSpd=0; c.curSpd=0;
            }
        } else { c.state='patrol'; c.patrolPts=genPatrolPts(); c.patrolIdx=0; }
        }
        break;

    case 'chase':
        if(!c.hasSeenHamster && !G.foodStolen){ c.state='patrol'; c.patrolPts=genPatrolPts(); c.patrolIdx=0; break; }
        if(G.foodStolen) c.committedChase=true;
        if(tickCatAbandon(c,h,d,dt)) break;
        c.face='chase';
        if(c.chargeCooldown>0) c.chargeCooldown-=dt;
        const pastWarmup = c.chaseBuildup >= CAT_CHASE_SMOKE_TIME + CAT_CHASE_ACCEL_TIME;
        if(c.dashTimer<=0 && pastWarmup && d>CAT_FAR_DIST && c.chargeCooldown<=0){
            c.state='charging'; c.chargeTimer=0; break;
        }
        c.chaseBuildup += dt;
        if(c.dashTimer>0){
            c.dashTimer-=dt;
            c.targetSpd=c.chaseSpeed*(1.1+c.dashTimer/CAT_DASH_TIME*0.35);
        } else if(c.chaseBuildup < CAT_CHASE_SMOKE_TIME){
            c.targetSpd = 0;
        } else if(c.chaseBuildup < CAT_CHASE_SMOKE_TIME + CAT_CHASE_ACCEL_TIME){
            const t = (c.chaseBuildup - CAT_CHASE_SMOKE_TIME) / CAT_CHASE_ACCEL_TIME;
            c.targetSpd = c.chaseSpeed * t;
        } else {
            c.targetSpd = c.chaseSpeed;
        }
        { const ct=getCatChaseTarget(c,h); catMove(c,ct.x,ct.y,dt); }
        break;

    case 'stunned':
        c.face='stunned';
        c.targetSpd = c.patrolSpeed * 0.4; // 眩晕时缓慢移动，不会卡住不动
        // 保持当前移动方向，不朝向老鼠（避免和碰撞推斥对抗导致卡死）
        if(Math.abs(c.vx)>0.01 || Math.abs(c.vy)>0.01){
            c.targetVx=c.vx; c.targetVy=c.vy;
        }
        if(c.stunTimer > 0) c.stunTimer -= dt;
        if(c.stunTimer <= 0){
            if(G.foodStolen && c.committedChase){
                startCatChase(c, G.hamster);
            } else {
                c.state='patrol'; c.patrolPts=genPatrolPts(); c.patrolIdx=0; c.face='normal';
                c.alertValue=0;
                if(c.patrolPts.length>0){
                    const pt=c.patrolPts[0];
                    const pdx=pt.x-c.x, pdy=pt.y-c.y;
                    const pLen=Math.hypot(pdx,pdy);
                    if(pLen>0.01){c.vx=pdx/pLen; c.vy=pdy/pLen; c.targetVx=pdx/pLen; c.targetVy=pdy/pLen;}
                }
            }
        }
        break;

    case 'confused':
        c.face='confused';
        c.targetSpd = c.patrolSpeed * 0.3; // 困惑时缓慢移动，不会卡住
        // 保持当前方向，不回头（避免和墙壁碰撞对抗导致卡死）
        c.targetVx = c.vx; c.targetVy = c.vy;
        // 追丢了，警戒值快速下降
        c.alertValue -= lv.alertSpeed * 4.0 * dt;
        if(c.stateTimer <= 0 && c.alertValue <= 0){
            c.state='patrol'; c.patrolPts=genPatrolPts(); c.patrolIdx=0; c.face='normal';
            if(c.patrolPts.length>0){
                const pt=c.patrolPts[0];
                const pdx=pt.x-c.x, pdy=pt.y-c.y;
                const pLen=Math.hypot(pdx,pdy);
                if(pLen>0.01){c.vx=pdx/pLen; c.vy=pdy/pLen; c.targetVx=pdx/pLen; c.targetVy=pdy/pLen;}
            }
        }
        break;
    }

    // 根据状态更新猫的图片
    updateCatImg(c, dt);

    // 碰撞冷却递减
    if(c.collCooldown > 0) c.collCooldown -= dt;

    // 应用物理速度
    applyCatPhysics(c, dt);

    // 只有追逐状态才能抓到老鼠
    if(c.state === 'chase' && d < c.r + h.r + 2 && h.invincible <= 0){
        catCatchHamster();
    }

    // 家具碰撞 — 所有状态都处理（防止卡死）
    if(c.collCooldown <= 0){
        for(let f of G.furniture){
            if(f.interactive && c.state!=='sleeping' && circRectHit(c.x,c.y,c.r,f.x,f.y,f.w,f.h)){
                const isDecor = !!f.decor;
                const stun=getStunTime(f);
                // 追逐中高速撞障：前3次递减眩晕，之后只反弹（G.catHits 由 getStunTime 判定）
                if(stun>0 && isCatPursuing(c) && isCatFastEnough(c)){
                    c.state='stunned'; c.stunTimer=stun;
                    SFX.play('stun');
                    c.alertValue=Math.max(0,c.alertValue-20);
                    G.catHits++;
                    G.shakeTimer=0.3; G.shakeIntensity=5;
                    if(isDecor) f.shakeTimer=0.45;
                    const pushPad = isDecor ? 6 : 20;
                    // 第3次眩晕后不再大幅推开（原地晕）
                    if(G.catHits < CAT_MAX_STUN_HITS){
                        const p=pushOut(c.x,c.y,c.r+pushPad,f.x,f.y,f.w,f.h);
                        const pdx=p.x-c.x, pdy=p.y-c.y;
                        c.x=p.x; c.y=p.y;
                        // 眩晕时方向设为远离家具
                        if(Math.hypot(pdx,pdy)>0.01){
                            const vLen=Math.hypot(pdx,pdy);
                            c.vx=pdx/vLen; c.vy=pdy/vLen;
                            c.targetVx=c.vx; c.targetVy=c.vy;
                        }
                    }
                    c.curSpd *= 0.5;
                    c.collCooldown = 0.05;
                } else {
                    const pushPad = f.decor ? 8 : 12;
                    const p=pushOut(c.x,c.y,c.r+pushPad,f.x,f.y,f.w,f.h);
                    c.x=p.x; c.y=p.y;
                    if(f.decor) f.shakeTimer=0.35;
                    catDeflectFromFurniture(c,f);
                }
                break;
            }
        }
    }
    // 陷阱碰撞
    for(let i=G.placedTraps.length-1;i>=0;i--){
        const tr=G.placedTraps[i];
        if(dist(c,tr)<c.r+16){
            const td=TRAP_DATA[tr.type], stun=getStunTime(null,td);
            if(stun>0){
                c.state='stunned'; c.stunTimer=stun;
                c.alertValue=Math.max(0,c.alertValue-20);
                G.catHits++; G.shakeTimer=0.3; G.shakeIntensity=5;
                G.placedTraps.splice(i,1);
                c.curSpd=0;
            }
        }
    }
    // 墙壁碰撞
    if(c.collCooldown<=0 && c.state!=='sleeping'){
        for(let w of G.walls){
            if(circRectHit(c.x,c.y,c.r+2,w.x,w.y,w.w,w.h)){
                const p=pushOut(c.x,c.y,c.r+8,w.x,w.y,w.w,w.h);
                const pdx=p.x-c.x, pdy=p.y-c.y;
                const pLen=Math.hypot(pdx,pdy);
                c.x=p.x; c.y=p.y;
                const wallStun = getStunTime(null);
                if(wallStun>0 && isCatPursuing(c) && isCatFastEnough(c)){
                    c.state='stunned'; c.stunTimer=wallStun;
                    SFX.play('stun');
                    c.alertValue=Math.max(0,c.alertValue-15);
                    G.catHits++;
                    G.shakeTimer=0.3; G.shakeIntensity=5;
                    c.curSpd *= 0.4;
                    c.collCooldown = 0.05;
                } else if(pLen>0.01){
                    catDeflectFromWall(c, pdx/pLen, pdy/pLen);
                } else {
                    c.collCooldown=0.5; c.curSpd*=0.3;
                }
                break;
            }
        }
    }
    // 窄道：猫太胖进不去
    if(c.state!=='sleeping' && G.narrowGaps){
        for(let gap of G.narrowGaps){
            if(gap.type!=='mouse') continue;
            if(circRectHit(c.x,c.y,c.r,gap.x,gap.y,gap.w,gap.h)){
                const p=pushOut(c.x,c.y,c.r+6,gap.x,gap.y,gap.w,gap.h);
                c.x=p.x; c.y=p.y;
                const pdx=c.x-(gap.x+gap.w), pdy=c.y-(gap.y+gap.h/2);
                if(Math.hypot(pdx,pdy)<0.01){ c.vx=1; c.vy=0; } else { c.vx=pdx/Math.hypot(pdx,pdy); c.vy=pdy/Math.hypot(pdx,pdy); }
                c.targetVx=c.vx; c.targetVy=c.vy;
                c.curSpd=Math.min(c.curSpd, c.patrolSpeed*0.5);
                c.collCooldown=0.4;
            }
        }
    }
    clampCatInBounds(c);
    c.alertValue = clamp(c.alertValue, 0, 100);
}

// catMove: 只设置目标方向，不直接改变当前速度方向
function catMove(cat, tx, ty, dt){
    if(cat.avoidUntil && G.time < cat.avoidUntil){
        cat.targetVx=cat.avoidVx; cat.targetVy=cat.avoidVy;
        cat.dir=Math.abs(cat.targetVx)>Math.abs(cat.targetVy)?(cat.targetVx>0?3:2):(cat.targetVy>0?0:1);
        return;
    }
    const dx=tx-cat.x, dy=ty-cat.y, d=Math.hypot(dx,dy);
    if(d>0.5){
        cat.targetVx=dx/d; cat.targetVy=dy/d;
        cat.dir=Math.abs(cat.targetVx)>Math.abs(cat.targetVy)?(cat.targetVx>0?3:2):(cat.targetVy>0?0:1);
    } else if(d>0.01){
        // 极近距离也保持方向，避免目标丢失导致卡住
        cat.targetVx=dx/d; cat.targetVy=dy/d;
    }
}
function catMoveDir(cat, nx, ny){
    const len=Math.hypot(nx,ny);
    if(len>0.01){cat.targetVx=nx/len; cat.targetVy=ny/len;}
    cat.dir=Math.abs(cat.targetVx)>Math.abs(cat.targetVy)?(cat.targetVx>0?3:2):(cat.targetVy>0?0:1);
}

// 应用物理：平滑加速/减速 + 方向惯性平滑 + 智能避障
function applyCatPhysics(cat, dt){
    const h = G.hamster;
    const distToHamster = h ? dist(cat, h) : 9999;
    const catchDist = cat.r + (h?h.r:14) + 4; // 抓捕距离

    // --- 1. 速度大小平滑 ---
    if(cat.curSpd < cat.targetSpd){
        cat.curSpd += cat.accel * dt;
        if(cat.curSpd > cat.targetSpd) cat.curSpd = cat.targetSpd;
    } else if(cat.curSpd > cat.targetSpd){
        cat.curSpd -= cat.decel * dt;
        if(cat.curSpd < cat.targetSpd) cat.curSpd = cat.targetSpd;
    }
    if(cat.targetSpd<=0.01 && cat.curSpd>0){
        cat.curSpd -= cat.decel * 0.8 * dt;
        if(cat.curSpd<0) cat.curSpd=0;
    }

    // --- 2. 蓄力/窜出/眩晕：特殊移动规则 ---
    if(cat.state === 'charging'){
        const cLen=Math.hypot(cat.vx,cat.vy);
        if(cLen>0.01){ cat.vx/=cLen; cat.vy/=cLen; }
        const turnSpeed=cat.baseTurnRate*2.5*dt;
        const curAngle=Math.atan2(cat.vy,cat.vx);
        const tgtAngle=Math.atan2(cat.targetVy,cat.targetVx);
        let diff=tgtAngle-curAngle;
        while(diff>Math.PI) diff-=Math.PI*2;
        while(diff<-Math.PI) diff+=Math.PI*2;
        const na=curAngle+clamp(diff,-turnSpeed,turnSpeed);
        cat.vx=Math.cos(na); cat.vy=Math.sin(na);
        return;
    }
    if(cat.state === 'confused' || cat.state === 'stunned'){
        // 保持当前方向不变，不参与下面的转向/避障
        const cLen = Math.hypot(cat.vx, cat.vy);
        if(cLen > 0.01){ cat.vx /= cLen; cat.vy /= cLen; }
        cat.vx *= cat.curSpd * 60;
        cat.vy *= cat.curSpd * 60;
        cat.x += cat.vx * dt;
        cat.y += cat.vy * dt;
        return; // 跳过后续所有转向避障逻辑
    }

    // --- 3. 方向惯性平滑（高速时转向更慢）---
    let desiredVx = cat.targetVx;
    let desiredVy = cat.targetVy;

    // --- 4. 智能避障：不是单纯刹车，而是绕开 ---
    let avoidVx = 0, avoidVy = 0;
    let needsAvoid = false;

    // 只在有速度时做避障（窜出时不避障，刹不住车）
    const isCloseToTarget = distToHamster < catchDist + 20;
    if(cat.curSpd > 0.1 && cat.dashTimer <= 0){
        // 近距离时（快要抓到老鼠），大幅缩短预判距离，避免因避障无法靠近
        // 预判距离：速度*反应时间，近距离时大幅缩短
        const reactTime = isCloseToTarget ? 0.05 : 0.10;
        const lookAhead = cat.curSpd * 60 * reactTime + cat.r + 3;
        const maxLook = isCloseToTarget ? 25 : 45;
        const la = Math.min(lookAhead, maxLook);

        // 沿当前速度方向多采样几个点检测障碍物
        let hitObstacle = null;
        let hitDist = la;
        const samples = 6;
        for(let i=1;i<=samples;i++){
            const t = i/samples;
            const sx = cat.x + cat.vx * la * t;
            const sy = cat.y + cat.vy * la * t;
            // 检查墙壁
            for(let w of G.walls){
                if(sx>w.x && sx<w.x+w.w && sy>w.y && sy<w.y+w.h){
                    hitObstacle = {x: sx, y: sy, type:'wall'};
                    hitDist = la * t;
                    break;
                }
            }
            if(hitObstacle) break;
            // 检查家具（追逐时才需要避让）
            if(cat.state==='chase'){
                for(let f of G.furniture){
                    if(f.interactive && sx>f.x-3 && sx<f.x+f.w+3 && sy>f.y-3 && sy<f.y+f.h+3){
                        // 如果老鼠就在家具里面/旁边（距离家具很近），不要避让，直接冲
                        if(h){
                            const hx=h.x, hy=h.y;
                            const hNearF = hx>f.x-15 && hx<f.x+f.w+15 && hy>f.y-15 && hy<f.y+f.h+15;
                            if(hNearF && distToHamster < hitDist + 20) continue; // 老鼠在家具旁，不避
                        }
                        hitObstacle = {x: sx, y: sy, type:'furn', fx:f.x+f.w/2, fy:f.y+f.h/2};
                        hitDist = la * t;
                        break;
                    }
                }
                if(hitObstacle) break;
            }
        }

        // 如果检测到障碍物，计算绕开方向
        if(hitObstacle){
            needsAvoid = true;
            let ax, ay;
            if(hitObstacle.type==='wall'){
                // 墙壁：选两个绕开方向中与目标（老鼠）方向更对齐的那一侧
                const tx1 = -cat.vy, ty1 = cat.vx;   // 左转90°
                const tx2 = cat.vy, ty2 = -cat.vx;   // 右转90°
                const dot1 = cat.targetVx * tx1 + cat.targetVy * ty1;
                const dot2 = cat.targetVx * tx2 + cat.targetVy * ty2;
                if(dot1 > dot2){ ax = tx1; ay = ty1; }
                else { ax = tx2; ay = ty2; }
                // 加入目标方向引导，不要完全横着走
                ax = ax * 0.6 + cat.targetVx * 0.4;
                ay = ay * 0.6 + cat.targetVy * 0.4;
            } else {
                // 家具：从家具中心推开
                ax = cat.x - hitObstacle.fx;
                ay = cat.y - hitObstacle.fy;
                const aLen = Math.hypot(ax,ay);
                if(aLen > 0.01){ ax/=aLen; ay/=aLen; }
                // 加入目标方向的引导（不要完全推开，要绕着走）
                ax = ax*0.5 + cat.targetVx*0.5;
                ay = ay*0.5 + cat.targetVy*0.5;
            }
            const aLen = Math.hypot(ax,ay);
            if(aLen > 0.01){ avoidVx = ax/aLen; avoidVy = ay/aLen; }

            // 近距离时不减速，保持冲力
            if(!isCloseToTarget){
                const slowFactor = Math.max(0.5, hitDist / la);
                cat.curSpd = Math.min(cat.curSpd, cat.chaseSpeed * slowFactor);
            }
        }
    }

    // 合并目标方向和避障方向：近距离时目标权重更高，不会绕大圈
    if(needsAvoid){
        // 距离越近，越偏向目标方向（避免绕大圈）
        const avoidWeight = isCloseToTarget ? 0.35 : 0.6;
        const tgtWeight = isCloseToTarget ? 0.65 : 0.4;
        desiredVx = desiredVx * tgtWeight + avoidVx * avoidWeight;
        desiredVy = desiredVy * tgtWeight + avoidVy * avoidWeight;
        const dLen = Math.hypot(desiredVx, desiredVy);
        if(dLen > 0.01){ desiredVx /= dLen; desiredVy /= dLen; }
    }

    // 如果cat没有初始化方向（vx/vy为0），直接设置为目标方向
    if(Math.abs(cat.vx)<0.01 && Math.abs(cat.vy)<0.01){
        cat.vx = desiredVx;
        cat.vy = desiredVy;
    }

    // 计算当前方向角和期望方向角
    const curAngle = Math.atan2(cat.vy, cat.vx);
    const tgtAngle = Math.atan2(desiredVy, desiredVx);
    let diff = tgtAngle - curAngle;
    while(diff > Math.PI) diff -= Math.PI*2;
    while(diff < -Math.PI) diff += Math.PI*2;
    const absDiff = Math.abs(diff);

    const spdRatio = cat.chaseSpeed > 0 ? cat.curSpd / cat.chaseSpeed : 0;
    let turnMult = 1.0;
    if(cat.dashTimer > 0){
        turnMult = lerp(0.04, 0.2, 1 - spdRatio);
    } else if(spdRatio > 0.75){
        turnMult = lerp(0.25, 1.0, (1 - spdRatio) / 0.25);
    }

    // 转弯时速度下降：高速时转弯更难
    const turnSlowdown = 1.0 - absDiff * (cat.dashTimer > 0 ? 0.95 : 0.8);
    const turnSlowdownClamped = Math.max(cat.dashTimer > 0 ? 0.15 : 0.25, turnSlowdown);
    cat.curSpd *= (1.0 + (turnSlowdownClamped - 1.0) * 3.0 * dt);

    const turnSpeed = cat.baseTurnRate * turnMult * (isCloseToTarget ? 2.0 : 1.0) * (1.0 + absDiff * 0.5);
    const maxTurn = turnSpeed * dt;
    const actualTurn = (absDiff < maxTurn) ? diff : Math.sign(diff) * maxTurn;
    const newAngle = curAngle + actualTurn;
    cat.vx = Math.cos(newAngle);
    cat.vy = Math.sin(newAngle);

    // 转向后拉回curSpd上限
    const spdCap = cat.dashTimer > 0 ? cat.chaseSpeed * 1.5 : cat.chaseSpeed;
    cat.curSpd = Math.min(cat.curSpd, spdCap);

    // --- 4. 应用位移 ---
    const move = cat.curSpd * 60 * dt;
    cat.x += cat.vx * move;
    cat.y += cat.vy * move;
}

function getStunTime(f,t){
    // 本关累计眩晕达 CAT_MAX_STUN_HITS 次后返回 0（只反弹不晕）
    if(G.catHits >= CAT_MAX_STUN_HITS) return 0;
    const base=t?t.stun:1.5;
    return [base, base*0.5, base*0.15][Math.min(G.catHits,2)];
}

// 更新交替动画：停几秒 → 切另一个 → 停1秒 → 切回，随机间隔
function updateAlternating(c, dt, mainKey, altKey, minMain, maxMain, minAlt, maxAlt){
    c.altTimer -= dt;
    if(c.altTimer <= 0){
        if(c.altPhase === 'main'){
            c.altPhase = 'switched';
            c.altVariant = c.altVariant === 0 ? 1 : 0;
            // 切换到另一个，停留随机1~2秒
            c.altTimer = minAlt + Math.random()*(maxAlt - minAlt);
        } else {
            c.altPhase = 'main';
            // 回到主图，停留随机2~4秒
            c.altTimer = minMain + Math.random()*(maxMain - minMain);
        }
    }
    return c.altPhase === 'main' ? (c.altVariant === 0 ? mainKey[0] : mainKey[1]) : altKey[c.altVariant];
}

// 猫状态 → 图片映射（见 RULES.md 第7节）
function updateCatImg(c, dt){
    c.altTimer -= dt;
    switch(c.state){
    case 'sleeping':
        c.catImg='catSleep'; break;
    case 'stunned':
        c.catImg='catStun'; break;
    case 'surprised':
        c.catImg='catSurprise'; break;
    case 'charging':
        c.catImg='catAngry'; break;
    case 'chase':
        if(G.catHits >= 1){
            c.catImg = updateAlternating(c, dt, ['catRage1','catRage2'], ['catRage1','catRage2'], 2, 4, 0.8, 1.5);
        } else {
            c.catImg='catAngry';
        }
        break;
    case 'alert':
        c.catImg = updateAlternating(c, dt, ['catAlert1','catAlert2'], ['catAlert1','catAlert2'], 2.5, 4.5, 0.8, 1.2);
        break;
    case 'returning':
        c.catImg='catAlert1'; break;
    case 'lazy':
    case 'patrol':
        if(G.catHits>=1 && c.catImg!=='catHappy'){
            c.catImg='catAngry';
        } else {
            c.catImg='catAlert1';
        }
        break;
    case 'confused':
        if(c.catImg!=='catHappy') c.catImg='catAlert1';
        break;
    default:
        if(c.catImg!=='catHappy') c.catImg='catAlert1';
        break;
    }
}

function catCatchHamster(){
    SFX.play('hit');
    G.lives--;
    const h=G.hamster, c=G.cat;
    // 计算撞飞方向（从猫指向老鼠）
    let dx=h.x-c.x, dy=h.y-c.y;
    const dLen=Math.hypot(dx,dy);
    if(dLen>0.01){dx/=dLen; dy/=dLen;}
    // 老鼠被撞飞，但逐步检测不穿障碍物
    const knockback=20;
    let remaining=knockback;
    const step=5;
    while(remaining>0){
        const s=Math.min(step,remaining);
        const nx=h.x+dx*s, ny=h.y+dy*s;
        let blocked=false;
        // 检测墙壁
        for(let w of G.walls){
            if(circRectHit(nx,ny,h.r,w.x,w.y,w.w,w.h)){blocked=true; break;}
        }
        // 检测家具
        if(!blocked){
            for(let f of G.furniture){
                if(f.interactive && circRectHit(nx,ny,h.r,f.x,f.y,f.w,f.h)){blocked=true; break;}
            }
        }
        if(blocked) break;
        // 被猫撞飞不能滑进鼠洞
        if(dist({x:nx,y:ny}, G.ratHole) < h.r + G.ratHole.r) break;
        h.x=nx; h.y=ny;
        remaining-=s;
    }
    h.invincible=2.5;
    // 老鼠加速逃脱
    h.speedBoost=DIFFICULTY.hamsterSpeedBoost;
    h.speedBoostTimer=DIFFICULTY.hamsterBoostDuration;
    // 食物掉落在被撞飞后的位置
    if(G.foodCollected>0){
        G.foodCollected--;
        G.foodDropped.push({x:h.x,y:h.y,type:FOOD_TYPES[randInt(0,FOOD_TYPES.length-1)]});
        G.foodDropAlert = 2.0; // 掉落提醒持续2秒
    }
    c.state='confused'; c.stateTimer=1.5; c.alertValue=0;
    c.targetSpd=0; c.curSpd*=0.3; // 抓到后减速滑行
    // 猫开心
    c.catImg='catHappy'; c.catImgTimer=0;
    // 混淆后方向设为远离老鼠
    let cdx=c.x-h.x, cdy=c.y-h.y;
    const cdLen=Math.hypot(cdx,cdy);
    if(cdLen>0.01){
        c.vx=cdx/cdLen; c.vy=cdy/cdLen;
        c.targetVx=c.vx; c.targetVy=c.vy;
    }
    G.shakeTimer=0.5; G.shakeIntensity=8;
    G.hamster.face='surprise';
    if(G.lives<=0) setTimeout(()=>endGame(false),500);
}

// ============================================================
// 输入
// ============================================================
function setupInput(){
    canvas.addEventListener('touchstart', onTouchStart, {passive:false});
    canvas.addEventListener('touchmove', onTouchMove, {passive:false});
    canvas.addEventListener('touchend', onTouchEnd, {passive:false});
    canvas.addEventListener('mousedown', onMouseDown);
    canvas.addEventListener('mousemove', onMouseMove);
    canvas.addEventListener('mouseup', onMouseUp);
    // 键盘映射
    window.addEventListener('keydown', onKeyDown);
    window.addEventListener('keyup', onKeyUp);
}

// 键盘状态
const keys = { up:false, down:false, left:false, right:false };
function onKeyDown(e){
    if(e.key==='p' || e.key==='P' || e.key==='Escape'){
        if(G.scene==='game' && (G.state==='prepare' || G.state==='action')) togglePause();
        return;
    }
    if(G.paused || G.scene!=='game' || G.state!=='action') return;
    if(isGameInputBlocked()) return;
    switch(e.key){
        case 'w': case 'W': case 'ArrowUp': keys.up=true; break;
        case 's': case 'S': case 'ArrowDown': keys.down=true; break;
        case 'a': case 'A': case 'ArrowLeft': keys.left=true; break;
        case 'd': case 'D': case 'ArrowRight': keys.right=true; break;
    }
}
function onKeyUp(e){
    switch(e.key){
        case 'w': case 'W': case 'ArrowUp': keys.up=false; break;
        case 's': case 'S': case 'ArrowDown': keys.down=false; break;
        case 'a': case 'A': case 'ArrowLeft': keys.left=false; break;
        case 'd': case 'D': case 'ArrowRight': keys.right=false; break;
    }
}

function getTouches(e){ return e.changedTouches; }

function onTouchStart(e){
    e.preventDefault();
    if(isGameInputBlocked()) return;
    for(const t of e.changedTouches){
        const p=canvasCoord(t.clientX,t.clientY);
        processTap(p.x, p.y, t.identifier);
    }
}
function onTouchMove(e){
    e.preventDefault();
    if(isGameInputBlocked()) return;
    for(const t of e.changedTouches){
        if(t.identifier===G.touchJoy.id){
            const p=canvasCoord(t.clientX,t.clientY);
            const dx=p.x-G.touchJoy.startX, dy=p.y-G.touchJoy.startY;
            const maxR=50, d=Math.hypot(dx,dy);
            if(d>maxR){G.touchJoy.dx=dx/d*maxR;G.touchJoy.dy=dy/d*maxR;}
            else{G.touchJoy.dx=dx;G.touchJoy.dy=dy;}
        }
    }
}
function onTouchEnd(e){
    e.preventDefault();
    for(const t of e.changedTouches){
        if(t.identifier===G.touchJoy.id){
            G.touchJoy.id=-1;G.touchJoy.active=false;G.touchJoy.dx=0;G.touchJoy.dy=0;
        }
    }
}

let mouseDown=false;
function mouseCoord(e){
    const rect = canvas.getBoundingClientRect();
    return {x: e.offsetX * (GW / rect.width), y: e.offsetY * (GH / rect.height)};
}
function onMouseDown(e){
    mouseDown=true;
    if(isGameInputBlocked()) return;
    const p=mouseCoord(e);
    processTap(p.x, p.y, -1);
}
function onMouseMove(e){
    if(!mouseDown||!G.touchJoy.active) return;
    const p=mouseCoord(e);
    const dx=p.x-G.touchJoy.startX, dy=p.y-G.touchJoy.startY;
    const maxR=50, d=Math.hypot(dx,dy);
    if(d>maxR){G.touchJoy.dx=dx/d*maxR;G.touchJoy.dy=dy/d*maxR;}
    else{G.touchJoy.dx=dx;G.touchJoy.dy=dy;}
}
function onMouseUp(){
    mouseDown=false;
    G.touchJoy.id=-1;G.touchJoy.active=false;G.touchJoy.dx=0;G.touchJoy.dy=0;
}

function togglePause(){
    if(G.scene!=='game' || (G.state!=='prepare' && G.state!=='action')) return;
    G.paused = !G.paused;
    if(G.paused){
        G.touchJoy.active=false; G.touchJoy.id=-1; G.touchJoy.dx=0; G.touchJoy.dy=0;
        keys.up=keys.down=keys.left=keys.right=false;
    }
}

function processTap(x,y,touchId){
    if(!SFX.ctx) SFX.init();
    if(G.paused){
        if(btnHit(G.W/2-90, G.H/2-30, 180, 48, x, y)){ G.paused=false; return; }
        if(btnHit(G.W/2-90, G.H/2+30, 180, 48, x, y)){ G.paused=false; startLevel(G.currentLevel); return; }
        if(btnHit(G.W/2-90, G.H/2+90, 180, 48, x, y)){ G.paused=false; G.scene='levelSelect'; return; }
        return;
    }
    if(G.scene==='game' && (G.state==='prepare' || G.state==='action')){
        if(btnHit(G.W-52, 12, 40, 36, x, y)){ togglePause(); return; }
    }
    if(G.scene==='logo'){G.scene='menu';return;}
    if(G.scene==='menu'){
        if(btnHit(G.W/2-85,400,170,55,x,y)) G.scene='levelSelect';
        return;
    }
    if(G.scene==='levelSelect'){
        // 返回
        if(btnHit(20,20,70,40,x,y)){G.scene='menu';return;}
        // 关卡按钮
        const cols=4,cw=85,ch=80,sx=(G.W-cols*cw)/2,sy=140;
        for(let i=0;i<8;i++){
            const col=i%cols,row=Math.floor(i/cols);
            const bx=sx+col*cw+8,by=sy+row*(ch+18)+8;
            if(btnHit(bx,by,cw-16,ch-16,x,y) && i+1<=G.maxUnlocked){
                startLevel(i+1); return;
            }
        }
        return;
    }
    if(G.scene==='result'){
        if(G.stars===0){
            if(btnHit(G.W/2-65,430,130,45,x,y)){startLevel(G.currentLevel);return;}
            if(btnHit(G.W/2-50,490,100,40,x,y)){G.scene='levelSelect';return;}
        } else {
            if(btnHit(G.W/2-130,500,120,45,x,y)){startLevel(G.currentLevel);return;}
            if(G.currentLevel<8 && btnHit(G.W/2+10,500,120,45,x,y)){startLevel(G.currentLevel+1);return;}
            if(btnHit(G.W/2-50,560,100,40,x,y)){G.scene='levelSelect';return;}
        }
        return;
    }
    if(G.scene==='game' && G.state==='prepare'){
        // 开始行动
        if(btnHit(G.W/2-75,G.H-85,150,55,x,y)){startAction();return;}
        // 陷阱面板
        const lv=LEVELS[G.currentLevel-1];
        const trapY=G.H-155;
        for(let i=0;i<lv.traps.length;i++){
            const tid=lv.traps[i];
            if(btnHit(25+i*58,trapY,48,48,x,y)){
                if(G.energy>=TRAP_DATA[tid].energy) G.selectedTrap=(G.selectedTrap===tid)?null:tid;
                return;
            }
        }
        // 放置陷阱
        if(G.selectedTrap){
            const wx=G.camera.x+(x-G.W/2)/G.camera.zoom;
            const wy=G.camera.y+(y-G.H/2)/G.camera.zoom;
            if(wx>30&&wx<G.mapW-30&&wy>30&&wy<G.mapH-30){
                const td=TRAP_DATA[G.selectedTrap];
                G.energy-=td.energy;
                G.placedTraps.push({x:wx,y:wy,type:G.selectedTrap});
                G.selectedTrap=null;
            }
            return;
        }
        return;
    }
    // 行动阶段 - 香蕉皮放置
    if(G.scene==='game' && G.state==='action' && G.bananaCount > 0){
        const bbx=G.W-90, bby=G.H-80;
        if(btnHit(bbx,bby,80,55,x,y)){
            G.selectedBananaTrap = !G.selectedBananaTrap;
            return;
        }
        if(G.selectedBananaTrap){
            const wx=G.camera.x+(x-G.W/2)/G.camera.zoom;
            const wy=G.camera.y+(y-G.H/2)/G.camera.zoom;
            if(wx>30&&wx<G.mapW-30&&wy>30&&wy<G.mapH-30){
                G.bananaCount--;
                G.placedTraps.push({x:wx,y:wy,type:'banana'});
                G.selectedBananaTrap=false;
            }
            return;
        }
    }
    // 行动阶段 - 摇杆（底部中间区域触发）
    if(G.scene==='game' && G.state==='action' && y>G.H*0.65){
        G.touchJoy.active=true;
        G.touchJoy.id=touchId;
        G.touchJoy.startX=G.W/2; G.touchJoy.startY=G.H-140;
        G.touchJoy.dx=0; G.touchJoy.dy=0;
    }
}

// ============================================================
// 游戏流程
// ============================================================
function startLevel(lid){
    G.currentLevel=lid; G.scene='game'; G.state='opening';
    G.openingTimer=0; G.lives=3; G.foodCollected=0;
    G.foodDropped=[]; G.catHits=0; G.shakeTimer=0; G.redFlash=0;
    G.alertValue=0; G.paused=false; G.selectedTrap=null; G.countdown=-1; G.selectedBananaTrap=false;
    G.narrowGaps=[]; G.catPaths=[]; G.sageHint=null; G.powerups=[]; G.bananaTraps=[]; G.bananaCount=(lid===3)?2:0;
    G.foodStolen=false;
    const lv=LEVELS[lid-1];
    G.energy=lv.energy; G.maxEnergy=lv.energy;
    generateMap(lid);
    G.hamster=createHamster(); G.cat=createCat();
    // 猫出生在随机猫窝上，仅移动该猫窝到猫脚下（其余猫窝保持原位作装饰）
    if(G.spawnCatBed && G.cat){
        G.spawnCatBed.x=G.cat.x-G.spawnCatBed.w/2;
        G.spawnCatBed.y=G.cat.y-G.spawnCatBed.h/2;
    }
    // 第一关：猫强制睡觉更久，玩家先熟悉操作
    if(lid===1 && G.cat){
        G.cat.state='sleeping';
        G.cat.stateTimer=15; // 15秒睡眠，给玩家足够时间
        G.cat.alertValue=0;
        G.cat.face='sleeping';
        G.cat.catImg='catSleep';
    }
    // 第一关：食物放到猫附近，但避开障碍物/家具
    if(lid===1 && G.cat){
        const cx=G.cat.x, cy=G.cat.y;
        // 候选位置：猫附近，尽量避开家具/障碍物
        const nearFoods=[
            {x:cx+80,y:cy+50},{x:cx-70,y:cy+60},{x:cx+90,y:cy-40}
        ];
        for(let i=0;i<Math.min(G.foods.length,nearFoods.length);i++){
            let fx=nearFoods[i].x, fy=nearFoods[i].y;
            // 检查是否在家具内部，如果在就向外挪
            for(let f of G.furniture){
                if(f.interactive && fx>f.x-15 && fx<f.x+f.w+15 && fy>f.y-15 && fy<f.y+f.h+15){
                    const dx=fx-(f.x+f.w/2), dy=fy-(f.y+f.h/2);
                    const len=Math.hypot(dx,dy);
                    if(len>0.1){
                        fx=f.x+f.w/2 + dx/len*(Math.max(f.w,f.h)+20);
                        fy=f.y+f.h/2 + dy/len*(Math.max(f.w,f.h)+20);
                    }
                    break;
                }
            }
            G.foods[i].x=fx; G.foods[i].y=fy;
        }
    }
    G.camera.targetX=G.mapW/2; G.camera.targetY=G.mapH/2;
    const opZoom = (G.currentLevel===1) ? 0.75 : 0.35;
    G.camera.zoom=opZoom; G.camera.x=G.ratHole.x; G.camera.y=G.ratHole.y;
    G.tutorial={active:false,step:0,timer:0,text:''};
}
function startAction(){
    G.state='action'; G.actionTimer=0;
    G.camera.targetZoom=1.2;
    G.camera.targetX=G.hamster.x; G.camera.targetY=G.hamster.y;
    // 第1关引导：等猫开始追时才弹
    if(G.currentLevel===1){
        G.tutorial={active:false, step:0, timer:0, text:'', prevCatStunned:false, waitFood:true};
    }
}
function endGame(won){
    G.sageHint=null;
    G.paused=false;
    G.touchJoy.active=false; G.touchJoy.id=-1; G.touchJoy.dx=0; G.touchJoy.dy=0;
    keys.up=keys.down=keys.left=keys.right=false;
    SFX.play(won ? 'win' : 'lose');
    G.state='result'; G.scene='result';
    if(won){
        G.stars=G.lives;
        if(G.returnEarly) G.stars=Math.max(0,G.stars-1);
        if(G.foodCollected>=G.foodTarget)
            G.maxUnlocked=Math.max(G.maxUnlocked,G.currentLevel+1);
        G.bestStars[G.currentLevel]=Math.max(G.bestStars[G.currentLevel]||0,G.stars);
        saveProgress();
    } else {
        G.stars=0;
        if(G.cat) G.cat.catImg='catHappy';
        if(G.hamster){
            G.hamster.failAnim='main';
            G.hamster.failVariant=0;
            G.hamster.failTimer=2 + Math.random()*2;
        }
    }
}

// ============================================================
// 更新
// ============================================================
function update(dt){
    G.animFrame++; G.time+=dt;
    if(G.scene==='result' && G.stars===0) updateFailAnim(dt);
    for(let f of G.furniture){
        if(f.shakeTimer>0) f.shakeTimer-=dt;
    }
    switch(G.state){
    case 'opening': updateOpening(dt); break;
    case 'prepare': updatePrepare(dt); break;
    case 'action':  updateAction(dt);  break;
    }
    G.camera.x=lerp(G.camera.x,G.camera.targetX,4*dt);
    G.camera.y=lerp(G.camera.y,G.camera.targetY,4*dt);
    G.camera.zoom=lerp(G.camera.zoom,G.camera.targetZoom,3*dt);
    if(G.shakeTimer>0) G.shakeTimer-=dt;
    if(G.redFlash>0) G.redFlash-=dt;
    if(G.foodDropAlert>0) G.foodDropAlert-=dt;
}

function updateOpening(dt){
    G.openingTimer+=dt;
    const isL1=G.currentLevel===1;
    if(G.openingTimer<3.0){
        G.camera.targetX=G.mapW/2; G.camera.targetY=G.mapH/2;
        G.camera.targetZoom= isL1 ? 0.75 : 0.35;
        if(isL1) G.openingText='徒儿，这是厨房，你的冒险开始咯~';
    } else if(G.openingTimer<5.0){
        if(G.foods.length){
            const f=G.foods.reduce((a,b)=>dist(a,G.ratHole)>dist(b,G.ratHole)?a:b);
            G.camera.targetX=f.x; G.camera.targetY=f.y; G.camera.targetZoom=0.9;
        }
        if(isL1) G.openingText='看到那些好吃的没得？全给为师拿回来！';
    } else if(G.openingTimer<7.0){
        if(G.cat){
            G.camera.targetX=G.cat.x; G.camera.targetY=G.cat.y; G.camera.targetZoom=1.0;
        }
        if(isL1) G.openingText='那只胖猫在睡觉💤...莫去惹它哈！';
    } else if(G.openingTimer<9.5){
        if(isL1 && G.narrowGaps && G.narrowGaps[0]){
            const gap=G.narrowGaps[0];
            G.camera.targetX=gap.x+gap.w/2; G.camera.targetY=gap.y+gap.h/2; G.camera.targetZoom=1.3;
            G.openingText='左边那条窄道只有你钻得过去，胖猫进不来！';
        } else {
            G.camera.targetX=G.ratHole.x; G.camera.targetY=G.ratHole.y; G.camera.targetZoom=0.8;
            G.openingText='';
        }
    } else if(G.openingTimer<12.0){
        if(isL1){
            const pw=G.powerups && G.powerups.find(p=>p.type==='toycar');
            if(pw){
                G.camera.targetX=pw.x; G.camera.targetY=pw.y; G.camera.targetZoom=1.2;
            } else {
                G.camera.targetX=G.mapW/2; G.camera.targetY=G.mapH*0.45; G.camera.targetZoom=0.85;
            }
            G.openingText='路上有小车，捡到能自动冲一段，溜猫贼快！';
        } else {
            G.camera.targetX=G.ratHole.x; G.camera.targetY=G.ratHole.y; G.camera.targetZoom=0.8;
            G.openingText='';
        }
    } else if(G.openingTimer<13.5){
        G.camera.targetX=G.ratHole.x; G.camera.targetY=G.ratHole.y; G.camera.targetZoom=0.8;
        if(isL1) G.openingText='接下来就看你这个瓜娃子的了！';
    } else if(G.openingTimer<14.5){
        G.openingText='';
        G.countdown = 3;
        if(G.hamster){
            G.camera.targetX=G.hamster.x; G.camera.targetY=G.hamster.y; G.camera.targetZoom=1.2;
        }
    } else if(G.openingTimer<15.5){
        G.countdown = 2;
        if(G.hamster){
            G.camera.targetX=G.hamster.x; G.camera.targetY=G.hamster.y; G.camera.targetZoom=1.2;
        }
    } else if(G.openingTimer<16.5){
        G.countdown = 1;
        if(G.hamster){
            G.camera.targetX=G.hamster.x; G.camera.targetY=G.hamster.y; G.camera.targetZoom=1.2;
        }
    } else if(G.openingTimer<17.0){
        G.countdown = 0;
        if(G.hamster){
            G.camera.targetX=G.hamster.x; G.camera.targetY=G.hamster.y; G.camera.targetZoom=1.2;
        }
    } else {
        startAction();
    }
}

function updatePrepare(dt){
    G.prepareTimer+=dt;
    if(G.tutorial.active) G.tutorial.timer+=dt;
    if(G.cat && G.cat.state==='sleeping') G.cat.animT+=dt;
}

function updateAction(dt){
    G.actionTimer+=dt;
    const h=G.hamster, c=G.cat;

    // 摇杆 + 键盘输入（提示显示时禁止移动）
    let mx=0, my=0;
    if(G.sageHint && G.sageHint.timer > 0){
        mx=0; my=0; // 强制停止
    } else {
        if(G.touchJoy.active){
            const mag=Math.hypot(G.touchJoy.dx,G.touchJoy.dy);
            if(mag>5){
                mx=G.touchJoy.dx/mag; my=G.touchJoy.dy/mag;
            }
        }
    }
    if(h.toycarTimer > 0){
        mx=0; my=0; // 玩具车自动走，玩家不能控制
    }
    // 键盘输入（WASD/方向键）
    let kx=0, ky=0;
    if(G.sageHint && G.sageHint.timer > 0){
        kx=0; ky=0;
    } else {
        if(keys.up) ky-=1;
        if(keys.down) ky+=1;
        if(keys.left) kx-=1;
        if(keys.right) kx+=1;
    }
    const kLen=Math.hypot(kx,ky);
    if(kLen>0.01){
        kx/=kLen; ky/=kLen;
        if(Math.abs(mx)<0.01 && Math.abs(my)<0.01){ mx=kx; my=ky; }
    }
    const boostSpeed = h.speed * DIFFICULTY.hamsterSpeedBoost;
    const curSpeed = h.speedBoostTimer > 0 ? boostSpeed : h.speed;
    if(Math.abs(mx)>0.01 || Math.abs(my)>0.01){
        h.moving=true;
        h.x+=mx*curSpeed*60*dt; h.y+=my*curSpeed*60*dt;
        h.dir=Math.abs(mx)>Math.abs(my)?(mx>0?3:2):(my>0?0:1);
        // 更新拖尾
        if(!h.trail) h.trail=[];
        if(h.moving){
            h.trail.unshift({x:h.x,y:h.y});
            if(h.trail.length>8) h.trail.pop();
        } else {
            if(h.trail.length>0) h.trail.pop();
        }
    } else {
        h.moving=false;
        if(h.trail && h.trail.length>0) h.trail.pop();
    }
    // 加速计时递减
    if(h.speedBoostTimer>0) h.speedBoostTimer-=dt;

    // 道具检测
    for(let pw of G.powerups){
        if(!pw.collected && dist(h, pw) < h.r + 16){
            pw.collected = true;
            SFX.play('powerup');
            if(pw.type === 'toycar'){
                // 玩具车：自动向前走2秒，然后车消失
                h.toycarTimer = 2.0;
                if(Math.abs(mx)>0.01 || Math.abs(my)>0.01){
                    h.toycarDir = {x:mx, y:my};
                } else {
                    h.toycarDir = {x: h.dir===3?1:h.dir===2?-1:0, y: h.dir===0?1:h.dir===1?-1:0};
                }
                h.toycarSpeed = 180;
                G.floatTexts.push({x:h.x,y:h.y-20,text:'小车!',timer:1.0,maxTimer:1.0,color:'#FF6347'});
            }
        }
    }
    // 玩具车更新
    if(h.toycarTimer > 0){
        h.toycarTimer -= dt;
        h.x += h.toycarDir.x * h.toycarSpeed * dt;
        h.y += h.toycarDir.y * h.toycarSpeed * dt;
        h.x = clamp(h.x, h.r+10, G.mapW-h.r-10);
        h.y = clamp(h.y, h.r+10, G.mapH-h.r-10);
        if(h.toycarTimer <= 0){
            // 车消失，掉落小尘埃
            G.floatTexts.push({x:h.x,y:h.y-20,text:'车没了!',timer:0.8,maxTimer:0.8,color:'#888'});
        }
    }

    // 碰撞
    for(let w of G.walls){
        if(circRectHit(h.x,h.y,h.r,w.x,w.y,w.w,w.h)){
            const p=pushOut(h.x,h.y,h.r+1,w.x,w.y,w.w,w.h);
            h.x=p.x; h.y=p.y;
        }
    }
    for(let f of G.furniture){
        if(circRectHit(h.x,h.y,h.r,f.x,f.y,f.w,f.h)){
            const p=pushOut(h.x,h.y,h.r+1,f.x,f.y,f.w,f.h);
            h.x=p.x; h.y=p.y;
        }
    }

    // 食物偷取 - 老鼠可以移动，只要在食物范围内就继续偷
    if(!h.stealing){
        for(let food of G.foods){
            if(!food.collected && !food.stealing && dist(h,food)<h.r+22){
                h.stealing=true; h.stealTarget=food; h.stealProgress=0;
                food.stealing=true;
            }
        }
    }
    if(h.stealing){
        const td = h.stealTarget;
        // 检查是否还在食物范围内
        if(td && dist(h,td) < h.r+22){
            h.stealProgress+=dt*1.2;
            if(h.stealProgress>=1){
                td.collected=true; td.stealing=false;
                G.foodCollected++; SFX.play('collect'); h.stealing=false; h.stealTarget=null;
                G.foodStolen=true;
                G.floatTexts.push({x:h.x,y:h.y-20,text:`+${G.foodCollected}`,timer:1.2,maxTimer:1.2,color:'#FFD700'});
                h.stealProgress=0; h.face='happy';
                setTimeout(()=>{if(G.hamster) G.hamster.face='normal';},1000);
                if(G.cat){
                    G.cat.alertValue=100;
                    G.cat.committedChase=true;
                    G.cat.hasSeenHamster=true;
                    if(G.cat.state==='sleeping'||G.cat.state==='lazy'||G.cat.state==='patrol'){
                        wakeCatSurprised(G.cat);
                    } else if(G.cat.state!=='chase'&&G.cat.state!=='charging'&&G.cat.state!=='surprised'){
                        startCatChase(G.cat,h);
                    }
                }
            }
        } else {
            // 离开食物范围，取消偷取
            if(td) td.stealing=false;
            h.stealing=false; h.stealProgress=0;
        }
    }

    // 捡掉落食物
    for(let i=G.foodDropped.length-1;i>=0;i--){
        if(dist(h,G.foodDropped[i])<h.r+16){
            G.foodCollected++;
            SFX.play('collect');
            G.floatTexts.push({x:h.x,y:h.y-20,text:`+${G.foodCollected}`,timer:1.2,maxTimer:1.2,color:'#FFD700'});
            G.foodDropped.splice(i,1);
        }
    }

    // 无敌
    if(h.invincible>0) h.invincible-=dt;

    // 猫AI
    updateCat(dt);

    // 镜头
    G.camera.targetX=h.x; G.camera.targetY=h.y;
    const cd=dist(h,c);
    if(cd<100){G.camera.targetZoom=1.4;G.redFlash=0.5;h.face='alert';}
    else if(cd<200){G.camera.targetZoom=1.25;if(h.face!=='happy')h.face='alert';}
    else{G.camera.targetZoom=1.2;if(h.face==='alert')h.face='normal';}

    G.alertValue=c.alertValue;

    // 鼠洞 - 玩家主动进洞才算赢（被猫撞飞进洞不算）
    if(G.state==='action' && h.invincible <= 0 && dist(h,G.ratHole)<h.r+G.ratHole.r){
        if(G.foodCollected===0){
            // 还没拿食物就想跑？仙人提示
            G.sageHint={text:'等等！还没拿到食物呢，再去找找~',timer:2.5};
        } else {
            G.returnEarly=G.foodCollected<G.foodTarget;
            endGame(true);
        }
    }

    // 仙人近距离提示（已移除"快躲到家具后面！"）
    if(G.sageHint){
        G.sageHint.timer -= dt;
        if(G.sageHint.timer <= 0) G.sageHint = null;
    }

    // 新手引导
    if(G.tutorial.active){G.tutorial.timer+=dt;updateTutorial();}
}

function updateFailAnim(dt){
    const h=G.hamster;
    if(!h) return;
    h.failTimer -= dt;
    if(h.failTimer <= 0){
        h.failVariant = h.failVariant === 0 ? 1 : 0;
        h.failTimer = 2 + Math.random()*2;
    }
}

function updateTutorial(){
    const t=G.tutorial, h=G.hamster, c=G.cat;
    if(!t) return;

    // 第一关：等偷到食物后才激活引导
    if(t.waitFood){
        return; // 由 updateAction 中的食物偷取逻辑激活
    }
    if(!t.active) return;

    // 检查老鼠是否靠近家具/墙壁（用于引导"靠墙等猫"）
    function nearFurniture(){
        for(let f of G.furniture){
            if(f.interactive && circRectHit(h.x,h.y,h.r+30,f.x,f.y,f.w,f.h)) return true;
        }
        for(let w of G.walls){
            if(circRectHit(h.x,h.y,h.r+40,w.x,w.y,w.w,w.h)) return true;
        }
        return false;
    }
    // 检查猫是否在屏幕内
    function catOnScreen(){
        if(!c) return false;
        const z=G.camera.zoom;
        const sx=(c.x-G.camera.x)*z+G.W/2, sy=(c.y-G.camera.y)*z+G.H/2;
        return sx>0 && sx<G.W && sy>0 && sy<G.H;
    }
    const d=h&&c?dist(h,c):9999;
    const nearFurn=nearFurniture();
    const catVisible=catOnScreen();

    switch(t.step){
    case 0: // 偷到食物后猫惊醒，指引玩家躲到家具旁
        t.text='猫醒了！快躲到家具后面！';
        if(nearFurn && t.timer>1.5){t.step=1; t.timer=0;}
        break;
    case 1: // 等猫追过来
        t.text='站到家具旁边别动，等猫冲过来！';
        if(c&&c.state==='chase' && d<300 && nearFurn){t.step=2; t.timer=0;}
        break;
    case 2: // 等猫靠近
        t.text='稳住！等猫再靠近点...';
        if(c&&c.state==='chase' && d<100){t.step=3; t.timer=0;}
        break;
    case 3: // 闪开让猫撞家具
        t.text='就是现在！快闪开让猫撞家具！';
        if(c&&c.state==='stunned'){t.step=4; t.timer=0; t.prevCatStunned=true;}
        break;
    case 4: // 猫撞晕了，快跑回鼠洞
        t.text='猫撞晕了！快跑回鼠洞！';
        if(G.foodCollected>0 && dist(h,G.ratHole)<h.r+G.ratHole.r+20){t.step=5; t.timer=0;}
        if(t.timer>6){t.step=5; t.timer=0;} // 6秒后自动进入下一步
        break;
    case 5: // 完成
        t.text='成功！回洞就安全了！';
        if(t.timer>2){t.active=false;}
        break;
    }
}

// ============================================================
// 渲染
// ============================================================
function render(){
    ctx.clearRect(0,0,G.W,G.H);
    if(!G.canPlay){
        drawLoadingScreen();
        return;
    }
    let sx=0,sy=0;
    if(G.shakeTimer>0){sx=(Math.random()-0.5)*G.shakeIntensity;sy=(Math.random()-0.5)*G.shakeIntensity;}

    switch(G.scene){
    case 'logo': drawLogo(); break;
    case 'menu': drawMenu(); break;
    case 'levelSelect': drawLevelSelect(); break;
    case 'game': drawGame(sx,sy); break;
    case 'result': drawResult(); break;
    }
    if(G.paused) drawPauseOverlay();
}

function drawLoadingScreen(){
    ctx.fillStyle='#1a1a2e'; ctx.fillRect(0,0,G.W,G.H);
    ctx.fillStyle='#FFF'; ctx.font='bold 22px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('仓鼠大作战', G.W/2, G.H/2-60);
    const pct = criticalTotal ? Math.floor(criticalLoaded / criticalTotal * 100) : 0;
    ctx.font='16px sans-serif';
    ctx.fillText('加载核心素材 '+pct+'%', G.W/2, G.H/2);
    ctx.font='12px sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.fillText('('+imagesLoaded+'/'+imagesTotal+' 张，家具/食物后台加载)', G.W/2, G.H/2+22);
    ctx.fillStyle='#FFF';
    const bw=200, bh=8, bx=G.W/2-bw/2, by=G.H/2+30;
    ctx.fillStyle='rgba(255,255,255,0.15)'; rRect(bx,by,bw,bh,4); ctx.fill();
    ctx.fillStyle=C.gold; rRect(bx,by,bw*pct/100,bh,4); ctx.fill();
}

// ---- Logo ----
function drawLogo(){
    const grad=ctx.createLinearGradient(0,0,0,G.H);
    grad.addColorStop(0,'#FFE4B5'); grad.addColorStop(1,'#F5E6C8');
    ctx.fillStyle=grad; ctx.fillRect(0,0,G.W,G.H);

    ctx.fillStyle=C.darkBrown; ctx.font='bold 44px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('仓鼠大作战',G.W/2,G.H/2-50);

    // 仓鼠绘制
    drawHamsterSprite(G.W/2,G.H/2+30,30,'normal',0);

    const alpha=0.4+0.4*Math.sin(G.time*3);
    ctx.globalAlpha=alpha;
    ctx.fillStyle=C.darkBrown; ctx.font='18px sans-serif';
    ctx.fillText('点击屏幕开始',G.W/2,G.H/2+110);
    ctx.globalAlpha=1;
}

// ---- Menu ----
function drawMenu(){
    const grad=ctx.createLinearGradient(0,0,0,G.H);
    grad.addColorStop(0,'#FFE4B5'); grad.addColorStop(1,'#F0E4D4');
    ctx.fillStyle=grad; ctx.fillRect(0,0,G.W,G.H);
    drawFloorTile(0,0,G.W,G.H);

    ctx.fillStyle=C.darkBrown; ctx.font='bold 38px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('仓鼠大作战',G.W/2,100);

    drawHamsterSprite(G.W/2,240,50,'happy',0);

    drawBtn(G.W/2-85,400,170,55,'开始游戏',C.uiGreen,'#FFF');
    ctx.fillStyle='#999'; ctx.font='14px sans-serif';
    ctx.fillText('V1.0',G.W/2,G.H-30);
}

// ---- Level Select ----
function drawLevelSelect(){
    const grad=ctx.createLinearGradient(0,0,0,G.H);
    grad.addColorStop(0,'#B8E6D0'); grad.addColorStop(1,'#F0E4D4');
    ctx.fillStyle=grad; ctx.fillRect(0,0,G.W,G.H);

    ctx.fillStyle='#333'; ctx.font='bold 28px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('选择关卡',G.W/2,55);

    drawBtn(20,20,70,40,'← 返回','#CCC','#333');

    const cols=4,cw=85,ch=80,sx=(G.W-cols*cw)/2,sy=140;
    for(let i=0;i<8;i++){
        const col=i%cols,row=Math.floor(i/cols);
        const x=sx+col*cw+8,y=sy+row*(ch+18)+8;
        const lv=LEVELS[i],unl=i+1<=G.maxUnlocked;
        ctx.fillStyle=unl?'#FFF8E1':'#E0E0E0';
        rRect(x,y,cw-16,ch-16,10); ctx.fill();
        if(unl){ctx.strokeStyle=C.gold;ctx.lineWidth=2;rRect(x,y,cw-16,ch-16,10);ctx.stroke();}
        ctx.fillStyle=unl?'#333':'#999';
        ctx.font='bold 20px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText(lv.name,x+(cw-16)/2,y+22);
        ctx.font='12px sans-serif';
        ctx.fillText('食物×'+lv.food,x+(cw-16)/2,y+44);
        // 星级
        if(G.bestStars[i+1]){
            let s='';
            for(let j=0;j<3;j++) s+=j<G.bestStars[i+1]?'⭐':'☆';
            ctx.font='12px serif';
            ctx.fillText(s,x+(cw-16)/2,y+60);
        }
    }
}

// ---- Game Scene ----
function drawGame(sx,sy){
    ctx.fillStyle='#1a1a1a'; ctx.fillRect(0,0,G.W,G.H); // 墙外区域深色
    ctx.save();
    const z=G.camera.zoom;
    ctx.translate(G.W/2+sx,G.H/2+sy);
    ctx.scale(z,z);
    ctx.translate(-G.camera.x,-G.camera.y);

    const dt = G.dt || 0.016; // 帧间隔

    drawFloorTile(0,0,G.mapW,G.mapH);
    // 地板边界清晰标记
    ctx.strokeStyle='rgba(100,80,60,0.5)'; ctx.lineWidth=3;
    ctx.strokeRect(0,0,G.mapW,G.mapH);
    for(let w of G.walls){ctx.fillStyle=C.wall;ctx.fillRect(w.x,w.y,w.w,w.h);ctx.strokeStyle='#9BC4A8';ctx.lineWidth=1;ctx.strokeRect(w.x,w.y,w.w,w.h);}
    // 窄道闪光提示
    if(G.narrowGaps && G.hamster){
        for(let gap of G.narrowGaps){
            const d = Math.sqrt((G.hamster.x-(gap.x+gap.w/2))**2 + (G.hamster.y-(gap.y+gap.h/2))**2);
            if(d < 150){ // 老鼠靠近窄道时才闪光
                const alpha = 0.15 + 0.1*Math.sin(G.time*4);
                ctx.fillStyle = `rgba(255,215,0,${alpha})`;
                ctx.fillRect(gap.x, gap.y, gap.w, gap.h);
                // 小箭头提示
                ctx.fillStyle = `rgba(255,215,0,${alpha+0.1})`;
                ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
                ctx.fillText('↔', gap.x + gap.w/2, gap.y - 8);
            }
        }
    }
    drawRatHole();
    for(let f of G.furniture) drawFurniture(f);
    for(let food of G.foods) if(!food.collected) drawFood(food);
    drawPowerups();
    // 食物范围圈提示
    if(G.hamster){
        for(let food of G.foods){
            if(!food.collected && !food.stealing){
                const fd = dist(G.hamster, food);
                if(fd < G.hamster.r+26){
                    const alpha = fd < G.hamster.r+22 ? 0.5 : 0.2;
                    ctx.strokeStyle = `rgba(255,215,0,${alpha})`; ctx.lineWidth = 2;
                    ctx.setLineDash([4,3]);
                    ctx.beginPath(); ctx.arc(food.x, food.y, G.hamster.r+22, 0, Math.PI*2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            }
        }
    }
    for(let food of G.foodDropped) drawFood(food,true);
    for(let tr of G.placedTraps) drawPlacedTrap(tr);
    if(G.cat) drawCat();
    if(G.hamster && G.hamster.visible) drawHamsterChar();
    // 浮动文字效果（+1等）需要dt
    drawFloatTexts(dt);

    ctx.restore();

    if(G.state==='prepare') drawPrepareUI();
    else if(G.state==='action') drawActionUI();
    else if(G.state==='opening') drawOpeningUI();

    // 红边
    if(G.redFlash>0){
        const a=Math.min(1,G.redFlash*2)*0.5;
        ctx.strokeStyle=`rgba(255,0,0,${a})`; ctx.lineWidth=16;
        ctx.strokeRect(0,0,G.W,G.H);
    }
    if(G.tutorial.active && G.tutorial.text) drawTutorial();
}

// ---- Prepare UI ----
function drawPrepareUI(){
    ctx.fillStyle=C.uiBg; rRect(8,8,G.W-16,40,12); ctx.fill();
    ctx.fillStyle='#FFF'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    const lv=LEVELS[G.currentLevel-1];
    ctx.fillText(`准备阶段 - ${lv.name} | 食物: ${G.foods.filter(f=>!f.collected).length}个`,G.W/2,28);

    // 陷阱面板 - 准备阶段也显示，但不显示能量
    if(lv.traps.length>0){
        const ty=G.H-155;
        ctx.fillStyle='rgba(0,0,0,0.65)';
        rRect(12,ty-12,lv.traps.length*58+20,58,10); ctx.fill();
        ctx.fillStyle='#FFF'; ctx.font='11px sans-serif'; ctx.textAlign='left';
        ctx.fillText('陷阱:',20,ty+5);
        for(let i=0;i<lv.traps.length;i++){
            const tid=lv.traps[i],td=TRAP_DATA[tid],tx=25+i*58;
            const sel=G.selectedTrap===tid,ok=G.energy>=td.energy;
            ctx.fillStyle=sel?'rgba(255,215,0,0.3)':'rgba(255,255,255,0.15)';
            rRect(tx,ty,48,42,8); ctx.fill();
            if(sel){ctx.strokeStyle=C.gold;ctx.lineWidth=2;rRect(tx,ty,48,42,8);ctx.stroke();}
            ctx.globalAlpha=ok?1:0.4;
            ctx.font='24px serif'; ctx.textAlign='center';
            ctx.fillText(td.icon,tx+24,ty+24);
            ctx.globalAlpha=1;
        }
    }

    // 准备阶段不显示能量（能量到行动阶段才显示）

    // 开始按钮
    drawBtn(G.W/2-75,G.H-85,150,55,'开始行动！',C.uiGreen,'#FFF');

    if(G.selectedTrap){
        ctx.fillStyle='rgba(255,215,0,0.8)'; ctx.font='12px sans-serif'; ctx.textAlign='center';
        ctx.fillText('点击地图放置陷阱',G.W/2,G.H-100);
    }
    drawPauseBtn();
}

// ---- Action UI ----
function drawActionUI(){
    ctx.fillStyle=C.uiBg; rRect(8,8,G.W-16,48,12); ctx.fill();
    ctx.textBaseline='middle'; ctx.textAlign='left';
    // 食物
    ctx.fillStyle='#FFF'; ctx.font='16px sans-serif';
    ctx.fillText(`🍖 ${G.foodCollected}/${G.foodTarget}`,20,32);
    // 能量
    if(LEVELS[G.currentLevel-1].traps.length>0){
        ctx.fillStyle=C.gold; ctx.font='12px sans-serif';
        ctx.fillText(`⚡${G.energy}`,20,18);
    }
    // 生命
    let hs='';for(let i=0;i<G.maxLives;i++) hs+=i<G.lives?'❤️':'🖤';
    ctx.font='18px serif'; ctx.textAlign='center';
    ctx.fillText(hs,G.W/2,32);
    // 加速提示
    if(G.hamster && G.hamster.speedBoostTimer>0){
        const alpha = G.hamster.speedBoostTimer < 0.5 ? G.hamster.speedBoostTimer/0.5 : 1;
        ctx.globalAlpha = alpha;
        ctx.fillStyle='#FFD700'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
        ctx.fillText('⚡加速 ' + G.hamster.speedBoostTimer.toFixed(1) + 's', G.W/2, 14);
        ctx.globalAlpha = 1;
    }
    // 掉落食物提醒
    if(G.foodDropAlert>0){
        const alpha = Math.min(1, G.foodDropAlert);
        ctx.globalAlpha = alpha;
        ctx.fillStyle='#FF6347'; ctx.font='bold 14px sans-serif'; ctx.textAlign='center';
        ctx.fillText('🍖 食物掉落了！快去捡回来！', G.W/2, 24);
        ctx.globalAlpha = 1;
    }
    // 仙人提示（统一位置：对话框上方，和开场引导位置一致）
    if(G.sageHint && G.sageHint.timer > 0){
        const alpha = Math.min(1, G.sageHint.timer);
        ctx.globalAlpha = alpha;
        const tw = G.W - 90, pad = 14;
        const tx = 45, ty = G.H - 190;
        const font = 'bold 14px sans-serif';
        const lines = wrapTextLines(G.sageHint.text, tw - pad * 2 - 40, font);
        const lineH = 20;
        const th = Math.max(44, lines.length * lineH + pad * 2);
        ctx.fillStyle='rgba(255,255,255,0.92)';
        rRect(tx, ty, tw, th, 12); ctx.fill();
        ctx.strokeStyle=C.gold; ctx.lineWidth=2; rRect(tx, ty, tw, th, 12); ctx.stroke();
        if(IMAGES.sage && IMAGES.sage.complete && !IMAGES.sage._failed){
            drawSageImage(tx+22, ty+th/2+2, 36);
        } else {
            ctx.font='24px serif'; ctx.textAlign='left'; ctx.textBaseline='middle';
            ctx.fillText('🧙', tx+6, ty+th/2);
        }
        ctx.fillStyle='#D35400'; ctx.font=font; ctx.textAlign='center'; ctx.textBaseline='middle';
        const startY = ty + th/2 - (lines.length - 1) * lineH / 2;
        for(let i=0; i<lines.length; i++){
            ctx.fillText(lines[i], tx + tw/2 + 12, startY + i * lineH);
        }
        ctx.globalAlpha = 1;
    }
    // 警觉条
    const bw=80,bh=12,bx=G.W-bw-28,by=24;
    ctx.fillStyle='rgba(255,255,255,0.25)'; rRect(bx,by,bw,bh,6); ctx.fill();
    const aw=(G.alertValue/100)*bw;
    if(aw>0){
        ctx.fillStyle=G.alertValue>60?'#FF4444':G.alertValue>30?'#FFA500':'#FFFF00';
        rRect(bx,by,Math.max(6,aw),bh,6); ctx.fill();
    }
    ctx.fillStyle='#FFF'; ctx.font='10px sans-serif';
    ctx.fillText('警觉',bx+bw/2,by-8);

    drawCatIndicator();
    drawJoystick();
    drawPauseBtn();

    // 偷取进度
    if(G.hamster && G.hamster.stealing){
        const bx2=G.W/2-45,by2=G.H/2+35;
        ctx.fillStyle='rgba(0,0,0,0.65)'; rRect(bx2,by2,90,18,9); ctx.fill();
        ctx.fillStyle=C.gold; rRect(bx2,by2,90*G.hamster.stealProgress,18,9); ctx.fill();
        ctx.fillStyle='#FFF'; ctx.font='11px sans-serif'; ctx.textAlign='center';
        ctx.fillText('偷取中...',G.W/2,by2+10);
    }

    // 回洞按钮
    if(G.hamster && G.foodCollected>0){
        const ba=0.6+0.4*Math.sin(G.time*4);
        ctx.globalAlpha=ba;
        drawBtn(G.W/2-55,G.H-115,110,38,'🏠回鼠洞',C.uiGreen,'#FFF');
        ctx.globalAlpha=1;
    }

    // 香蕉皮按钮（第三关）
    if(G.bananaCount > 0 && G.state==='action'){
        const bbx=G.W-90, bby=G.H-80;
        ctx.fillStyle='rgba(0,0,0,0.6)'; rRect(bbx,bby,80,55,10); ctx.fill();
        ctx.strokeStyle=C.gold; ctx.lineWidth=2; rRect(bbx,bby,80,55,10); ctx.stroke();
        ctx.font='22px serif'; ctx.textAlign='center';
        ctx.fillText('🍌',bbx+40,bby+22);
        ctx.fillStyle='#FFF'; ctx.font='11px sans-serif';
        ctx.fillText('香蕉皮x'+G.bananaCount,bbx+40,bby+44);
    }

    // 食物指引箭头 - 指向最近未收集食物
    {
        let nearest = null, minD = Infinity;
        for(let f of G.foods){
            if(f.collected || f.stealing) continue;
            const d2 = Math.hypot(G.hamster.x-f.x, G.hamster.y-f.y);
            if(d2 < minD){minD=d2; nearest=f;}
        }
        if(nearest){
            const ang = Math.atan2(nearest.y-G.hamster.y, nearest.x-G.hamster.x);
            const ix = G.W/2 + Math.cos(ang)*80;
            const iy = G.H/2 - 40 + Math.sin(ang)*80;
            ctx.save();
            ctx.translate(ix, iy);
            ctx.rotate(ang);
            const pulse = 0.7+0.3*Math.sin(G.time*4);
            ctx.globalAlpha = pulse;
            ctx.fillStyle = nearest.type.icon.includes('food') ? '#4CAF50' : '#FF9800';
            // 箭头
            ctx.beginPath();
            ctx.moveTo(14,0);
            ctx.lineTo(-6,-8);
            ctx.lineTo(-2,0);
            ctx.lineTo(-6,8);
            ctx.closePath();
            ctx.fill();
            ctx.rotate(-ang);
            ctx.font = '14px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(nearest.type.icon, 0, 2);
            ctx.globalAlpha = 1;
            ctx.restore();
        }
    }
}

function drawOpeningUI(){
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fillRect(0,0,G.W,G.H);
    ctx.fillStyle='#FFF'; ctx.font='18px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(`第${G.currentLevel}关 - ${LEVELS[G.currentLevel-1].name}`,G.W/2,G.H/2);
    // 第1关开场引导文字 + 仙人（原始大小在对话框上方）
    if(G.openingText){
        const sageDrawY = G.H - 130;
        const sageDrawX = G.W/2 - 100;
        if(IMAGES.sage && IMAGES.sage.complete && !IMAGES.sage._failed){
            drawSageImage(sageDrawX, sageDrawY, 100);
        } else {
            ctx.font='56px serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText('🧙',sageDrawX,sageDrawY-50);
        }
        const bw=G.W-90, bx=45, pad=12, font='15px sans-serif';
        const lines = wrapTextLines(G.openingText, bw - pad * 2, font);
        const lineH = 21;
        const bh = Math.max(50, lines.length * lineH + pad * 2);
        const by = G.H - 95 - bh;
        drawTextBox(G.openingText, bx, by, bw, 50, font, '#333', pad);
    }
    // 321倒计时
    if(G.countdown>=0){
        ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,G.W,G.H);
        ctx.fillStyle='#FFD700'; ctx.font='bold 80px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
        if(G.countdown===0){
            ctx.fillText('GO!',G.W/2,G.H/2);
        } else {
            ctx.fillText(String(G.countdown),G.W/2,G.H/2);
        }
    }
}

function drawTutorial(){
    const t=G.tutorial;
    const bw=G.W-90, bx=45, by=G.H-140;
    const sageDrawX=G.W/2-100, sageDrawY=by+95;

    ctx.fillText(`${t.step+1}/6`, bx+bw-10, by+bh-5);
}

// ---- Result ----
function drawResult(){
    const grad=ctx.createLinearGradient(0,0,0,G.H);
    grad.addColorStop(0,G.stars>0?'#FFF8E1':'#FFD4D4'); grad.addColorStop(1,'#F0E4D4');
    ctx.fillStyle=grad; ctx.fillRect(0,0,G.W,G.H);

    ctx.fillStyle='#333'; ctx.font='bold 34px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='middle';
    if(G.stars===0){
        ctx.fillText('Game Over',G.W/2,100);
        drawHamsterSprite(G.W/2,180,30,'surprise',0);
    } else {
        ctx.fillText('通关！',G.W/2,100);
        let s='';for(let i=0;i<3;i++) s+=i<G.stars?'⭐':'☆';
        ctx.font='40px serif'; ctx.fillText(s,G.W/2,170);
        drawHamsterSprite(G.W/2,240,30,'happy',0);
    }

    ctx.fillStyle='#555'; ctx.font='18px sans-serif';
    ctx.fillText(`收集食物: ${G.foodCollected}/${G.foodTarget}`,G.W/2,300);
    ctx.fillText(`剩余生命: ${G.lives}❤️`,G.W/2,330);
    ctx.fillText(`第${G.currentLevel}关 ${LEVELS[G.currentLevel-1].name}`,G.W/2,360);

    if(G.stars===0){
        drawBtn(G.W/2-65,430,130,45,'重试',C.uiRed,'#FFF');
        drawBtn(G.W/2-50,490,100,40,'返回','#CCC','#333');
    } else {
        drawBtn(G.W/2-130,500,120,45,'重玩','#CCC','#333');
        if(G.currentLevel<8) drawBtn(G.W/2+10,500,120,45,'下一关',C.uiGreen,'#FFF');
        drawBtn(G.W/2-50,560,100,40,'返回','#CCC','#333');
    }
}
