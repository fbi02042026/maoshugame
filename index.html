<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仓鼠大作战 - 测试入口</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  max-width: 480px;
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 20px;
  padding: 36px 32px;
  backdrop-filter: blur(12px);
  text-align: center;
}
h1 { font-size: 28px; margin-bottom: 8px; }
.sub { color: rgba(255,255,255,0.65); font-size: 14px; margin-bottom: 28px; }
.btn {
  display: block;
  width: 100%;
  padding: 14px 20px;
  margin-bottom: 12px;
  border: none;
  border-radius: 12px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  text-decoration: none;
  transition: transform 0.15s, box-shadow 0.15s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.btn-primary { background: #4CAF50; color: #fff; }
.btn-secondary { background: rgba(255,255,255,0.12); color: #fff; border: 1px solid rgba(255,255,255,0.2); }
.btn-standalone { background: #FF9800; color: #fff; }
.tips {
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,0.1);
  text-align: left;
  font-size: 13px;
  color: rgba(255,255,255,0.55);
  line-height: 1.7;
}
.tips strong { color: rgba(255,255,255,0.85); }
kbd {
  display: inline-block;
  padding: 2px 6px;
  background: rgba(255,255,255,0.15);
  border-radius: 4px;
  font-size: 12px;
}
.status { font-size: 12px; color: #4CAF50; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="card">
  <h1>🐹 仓鼠大作战</h1>
  <p class="sub">HTML5 Canvas 小游戏 · 测试入口</p>
  <p class="status" id="status">正在检测服务...</p>
  <a class="btn btn-primary" href="hamster_battle.html" id="playBtn">▶ 开始游戏（开发版）</a>
  <a class="btn btn-standalone" href="hamster_battle_standalone.html">📦 离线单文件版</a>
  <a class="btn btn-secondary" href="仓鼠大作战.html">🇨🇳 中文版（内嵌资源）</a>
  <div class="tips">
    <strong>操作说明</strong><br>
    · 移动：<kbd>WASD</kbd> / 方向键 / 底部虚拟摇杆<br>
    · 暂停：<kbd>P</kbd> / <kbd>Esc</kbd> / 右上角 ⏸ 按钮<br>
    · 存档：通关进度自动保存到 localStorage<br><br>
    <strong>平台对接提示</strong><br>
    后续接入微信小游戏 / 抖音小游戏时，建议以 <code>hamster_battle.html</code> 为源码基准，资源走 CDN，存档改用平台 SDK。
  </div>
</div>
<script>
fetch('hamster_battle.html', { method: 'HEAD' })
  .then(r => {
    document.getElementById('status').textContent = r.ok ? '✓ 游戏服务正常，可以开始测试' : '⚠ 游戏文件未找到';
  })
  .catch(() => {
    document.getElementById('status').textContent = '⚠ 请通过 HTTP 服务访问（不能直接打开本地文件）';
    document.getElementById('playBtn').textContent = '▶ 开始游戏（需 HTTP 服务）';
  });
</script>
</body>
</html>
