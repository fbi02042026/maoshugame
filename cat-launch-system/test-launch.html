<style>
:root { --bg: #1a1a2e; --panel: #16213e; --ink: #e0e0e0; --muted: #8892a4; --accent: #f0a050; }

  font-family: 'Segoe UI', system-ui, sans-serif;

}

<body>
<h1>猫弹射系统 · 测试场景</h1>
<div class="controls">WASD / 方向键 移动老鼠 | 空格键 重置 | P 切换预测线 | 猫可走+蓄能发射</div>
<div class="layout">
  <canvas id="c" width="380" height="520"></canvas>
  <div class="panel">
    <h3>猫状态</h3>
    <div class="stat"><span>状态</span><span class="val" id="catState">idle</span></div>
    <div class="stat"><span>特殊</span><span class="val" id="catSpecial">-</span></div>
    <div class="stat"><span>愤怒</span><span class="val" id="angerLevel">0/3</span></div>
    <div class="stat"><span>能量</span><span class="val" id="catEnergy">0</span></div>
    <div class="energy-bar"><div class="energy-fill" id="energyFill" style="width:0%;background:#f0a050"></div></div>
    <div class="stat"><span>弹射距离</span><span class="val" id="launchDist">0 px</span></div>
    <div class="stat"><span>猫鼠距离</span><span class="val" id="actualDist">0 px</span></div>
    <div class="stat"><span>发射次数</span><span class="val" id="launchCount">0</span></div>
    <div class="stat"><span>碰墙次数</span><span class="val" id="bounceCount">0</span></div>
    <div class="stat"><span>眩晕次数</span><span class="val warn" id="stunCount">0</span></div>
    <div class="legend">
      <div><span style="background:#4ade80"></span> 老鼠 (玩家)</div>
      <div><span style="background:#f0a050"></span> 猫 (行走)</div>
      <div><span style="background:#ff3333"></span> 猫 (愤怒)</div>
      <div style="color:#f0a050">--- 预测线</div>
      <div style="color:#e05353">██ 眩晕</div>
      <div style="color:#ffaa00">~~~ 蓄能</div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 物理参数
// ============================================================
const MAP_W = 380;
const MAP_H = 520;
const WALL_T = 18;
const MOUSE_R = 7;
const CAT_R = 9;

// 行走
const WALK_SPEED = 90;       // 猫行走速度 (比老鼠120慢)
const MOUSE_SPEED = 120;     // 老鼠移动速度

// 蓄能弹射
const CHARGE_RATE = 40;      // 每秒蓄能 (约2.5秒满)
const MAX_SPEED = 500;       // 满能量发射速度
const MAX_TIME = 1.5;        // 满能量飞行时间
const MIN_LAUNCH_ENERGY = 30;// 最小发射能量
const WALL_BOUNCE_DECAY = 0.7;// 碰墙速度保留
const STUN_DURATION = 1.5;   // 眩晕时间
const PREDICTION_WEIGHT = 0.65;

// 愤怒
const ANGER_THRESHOLD = 3;   // 眩晕3次触发愤怒
const ANGER_DIST_BONUS = 0.3; // 愤怒弹射距离+30%

// AI 决策
const CHASE_DIST = 150;      // 小于此距离纯走路追
const LAUNCH_DIST = 200;     // 大于此距离考虑蓄能发射
const RUN_AWAY_DOT = -0.1;   // 老鼠跑开判定 (方向点积 < 此值)

// ============================================================
// 墙壁
// ============================================================
const walls = [
  { x: 0, y: 0, w: MAP_W, h: WALL_T },
  { x: 0, y: MAP_H - WALL_T, w: MAP_W, h: WALL_T },
  { x: 0, y: 0, w: WALL_T, h: MAP_H },
  { x: MAP_W - WALL_T, y: 0, w: WALL_T, h: MAP_H },
];

// ============================================================
// 家具生成：中间和墙边都有
// ============================================================
const furniture = [];
function spawnFurniture() {
  furniture.length = 0;
  const count = 2 + Math.floor(Math.random() * 4); // 2-5个
  const wallCount = Math.min(1 + Math.floor(Math.random() * 2), count); // 1-2个靠墙

  for (let i = 0; i < count; i++) {
    const isWall = i < wallCount;
    for (let attempt = 0; attempt < 60; attempt++) {
      const w = 22 + Math.random() * 40;
      const h = 22 + Math.random() * 40;
      let x, y;

      if (isWall) {
        const side = Math.floor(Math.random() * 4);
        switch (side) {
          case 0: x = WALL_T + Math.random() * (MAP_W - WALL_T * 2 - w); y = WALL_T; break;
          case 1: x = WALL_T + Math.random() * (MAP_W - WALL_T * 2 - w); y = MAP_H - WALL_T - h; break;
          case 2: x = WALL_T; y = WALL_T + Math.random() * (MAP_H - WALL_T * 2 - h); break;
          case 3: x = MAP_W - WALL_T - w; y = WALL_T + Math.random() * (MAP_H - WALL_T * 2 - h); break;
        }
      } else {
        // 中间区域：避开中心和猫出生点
        x = WALL_T + 20 + Math.random() * (MAP_W - WALL_T * 2 - 40 - w);
        y = WALL_T + 20 + Math.random() * (MAP_H - WALL_T * 2 - 40 - h);
      }

      let overlap = false;
      for (const f of furniture) {
        if (x + w + 12 <= f.x || x >= f.x + f.w + 12 || y + h + 12 <= f.y || y >= f.y + f.h + 12) continue;
        overlap = true; break;
      }
      // 避开猫出生点
      const catSpawn = { x: MAP_W / 2, y: MAP_H - 50 };
      const cx = x + w / 2, cy = y + h / 2;
      if (Math.hypot(cx - catSpawn.x, cy - catSpawn.y) < 50) { overlap = true; }
      // 避开老鼠出生点
      const mouseSpawn = { x: MAP_W / 2, y: MAP_H / 2 - 60 };
      if (Math.hypot(cx - mouseSpawn.x, cy - mouseSpawn.y) < 40) { overlap = true; }

      if (!overlap) { furniture.push({ x, y, w, h, onWall: isWall }); break; }
    }
  }
}

// ============================================================
// 游戏状态
// ============================================================
let mouse = { x: MAP_W / 2, y: MAP_H / 2 - 60, r: MOUSE_R, vx: 0, vy: 0 };
let cat = {
  x: MAP_W / 2, y: MAP_H - 50, r: CAT_R,
  state: 'walking',    // walking | charging | launching | stunned
  energy: 0,
  walkVx: 0, walkVy: 0,
  launchVx: 0, launchVy: 0,
  launchSpeed: 0, flightTime: 0, flightTimer: 0,
  stunTimer: 0,
  bounceCount: 0, stunCount: 0, launchCount: 0,
  angerLevel: 0,
};
let showPrediction = true;
let keys = {};
let lastTime = performance.now();
let gameTime = 0;

// ============================================================
// 输入
// ============================================================
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; e.preventDefault(); });

// ============================================================
// 碰撞检测
// ============================================================
function rectCircleCollide(rx, ry, rw, rh, cx, cy, cr) {
  const closestX = Math.max(rx, Math.min(cx, rx + rw));
  const closestY = Math.max(ry, Math.min(cy, ry + rh));
  return Math.hypot(cx - closestX, cy - closestY) < cr;
}

function checkFurnitureCollision(x, y, r) {
  for (const f of furniture) {
    if (rectCircleCollide(f.x, f.y, f.w, f.h, x, y, r)) return true;
  }
  return false;
}

function clampToRoom(x, y, r) {
  return {
    x: Math.max(WALL_T + r, Math.min(MAP_W - WALL_T - r, x)),
    y: Math.max(WALL_T + r, Math.min(MAP_H - WALL_T - r, y)),
  };
}

// ============================================================
// 弹射距离计算
// ============================================================
function calcLaunchDistance(energy, angerBonus = false) {
  const ratio = energy / 100;
  let dist = ratio * ratio * MAX_SPEED * MAX_TIME / 2;
  if (angerBonus) dist *= (1 + ANGER_DIST_BONUS);
  return dist;
}

// ============================================================
// 轨迹预测
// ============================================================
function predictTrajectory(startX, startY, dirX, dirY, energy) {
  const launchSpeed = (energy / 100) * MAX_SPEED;
  const flightTime = (energy / 100) * MAX_TIME;
  const step = 10;
  const points = [];
  let hitFurniture = false;
  let cx = startX, cy = startY;
  let cvx = dirX * launchSpeed, cvy = dirY * launchSpeed;
  let elapsed = 0;
  const dt = step / launchSpeed;
  let wallBounces = 0;

  while (elapsed < flightTime && wallBounces <= 2) {
    const tFrac = elapsed / flightTime;
    if (tFrac >= 1) break;
    const vx = cvx * (1 - tFrac);
    const vy = cvy * (1 - tFrac);
    if (Math.hypot(vx, vy) < 5) break;

    const nx = cx + vx * dt;
    const ny = cy + vy * dt;

    for (const f of furniture) {
      if (rectCircleCollide(f.x - 4, f.y - 4, f.w + 8, f.h + 8, nx, ny, CAT_R)) {
        hitFurniture = true;
        points.push({ x: nx, y: ny });
        return { points, hitFurniture };
      }
    }

    let bounced = false;
    if (nx - CAT_R < WALL_T) {
      cx = WALL_T + CAT_R + (WALL_T - (nx - CAT_R)); cvx = Math.abs(cvx) * WALL_BOUNCE_DECAY; bounced = true;
    } else if (nx + CAT_R > MAP_W - WALL_T) {
      cx = MAP_W - WALL_T - CAT_R - ((nx + CAT_R) - (MAP_W - WALL_T)); cvx = -Math.abs(cvx) * WALL_BOUNCE_DECAY; bounced = true;
    }
    if (ny - CAT_R < WALL_T) {
      cy = WALL_T + CAT_R + (WALL_T - (ny - CAT_R)); cvy = Math.abs(cvy) * WALL_BOUNCE_DECAY; bounced = true;
    } else if (ny + CAT_R > MAP_H - WALL_T) {
      cy = MAP_H - WALL_T - CAT_R - ((ny + CAT_R) - (MAP_H - WALL_T)); cvy = -Math.abs(cvy) * WALL_BOUNCE_DECAY; bounced = true;
    }

    if (bounced) {
      wallBounces++; elapsed = 0;
      if (Math.hypot(cvx, cvy) < 5) break;
      points.push({ x: cx, y: cy });
      continue;
    }

    cx = nx; cy = ny;
    points.push({ x: cx, y: cy });
    elapsed += dt;
  }

  return { points, hitFurniture };
}

// ============================================================
// 猫 AI
// ============================================================
function updateCat(dt) {
  const dx = mouse.x - cat.x;
  const dy = mouse.y - cat.y;
  const distToMouse = Math.hypot(dx, dy);
  const isAngry = cat.angerLevel >= ANGER_THRESHOLD;

  switch (cat.state) {
    case 'walking': {
      // 判断是否应该蓄能发射
      const dirX = distToMouse > 0 ? dx / distToMouse : 0;
      const dirY = distToMouse > 0 ? dy / distToMouse : 0;
      // 老鼠是否在跑开
      const mouseSpeed = Math.hypot(mouse.vx, mouse.vy);
      const dot = mouseSpeed > 10 ? (dirX * mouse.vx + dirY * mouse.vy) / (mouseSpeed || 1) : 1;
      // 老鼠是否在远离
      const runningAway = dot < RUN_AWAY_DOT;

      const shouldLaunch = distToMouse > LAUNCH_DIST || (distToMouse > CHASE_DIST && runningAway);

      if (shouldLaunch) {
        cat.state = 'charging';
        cat.energy = 0;
        cat.walkVx = 0; cat.walkVy = 0;
        break;
      }

      // 走路追老鼠
      const speed = isAngry ? WALK_SPEED * 1.2 : WALK_SPEED;
      cat.walkVx = dirX * speed;
      cat.walkVy = dirY * speed;
      let nx = cat.x + cat.walkVx * dt;
      let ny = cat.y + cat.walkVy * dt;
      // 行走不能穿过家具
      if (checkFurnitureCollision(nx, cat.y, cat.r)) { nx = cat.x; cat.walkVx = 0; }
      if (checkFurnitureCollision(nx, ny, cat.r)) { ny = cat.y; cat.walkVy = 0; }
      // 不能穿墙
      nx = Math.max(WALL_T + cat.r, Math.min(MAP_W - WALL_T - cat.r, nx));
      ny = Math.max(WALL_T + cat.r, Math.min(MAP_H - WALL_T - cat.r, ny));
      cat.x = nx;
      cat.y = ny;
      break;
    }

    case 'charging': {
      // 原地蓄能
      cat.energy = Math.min(100, cat.energy + CHARGE_RATE * dt);

      const dirX = distToMouse > 0 ? dx / distToMouse : 0;
      const dirY = distToMouse > 0 ? dy / distToMouse : 0;

      // 预判玩家位置
      const flyTime = (cat.energy / 100) * MAX_TIME;
      const predX = mouse.x + mouse.vx * flyTime * PREDICTION_WEIGHT;
      const predY = mouse.y + mouse.vy * flyTime * PREDICTION_WEIGHT;
      const clamped = clampToRoom(predX, predY, 0);
      const predDist = Math.hypot(clamped.x - cat.x, clamped.y - cat.y);
      const requiredEnergy = calcRequiredEnergy(predDist);

      // 能量够了就发射
      if (cat.energy >= requiredEnergy && cat.energy >= MIN_LAUNCH_ENERGY) {
        const pdx = clamped.x - cat.x;
        const pdy = clamped.y - cat.y;
        const pdist = Math.hypot(pdx, pdy);
        if (pdist > 10) {
          const pdirX = pdx / pdist;
          const pdirY = pdy / pdist;

          // 预测路径
          const pred = predictTrajectory(cat.x, cat.y, pdirX, pdirY, cat.energy);
          if (!pred.hitFurniture) {
            // 安全路径，发射！
            launchCat(pdirX, pdirY);
            break;
          }

          // 避障：尝试偏移角度
          for (const angle of [15, -15, 30, -30, 45, -45]) {
            const rad = angle * Math.PI / 180;
            const cos = Math.cos(rad), sin = Math.sin(rad);
            const odx = pdirX * cos - pdirY * sin;
            const ody = pdirX * sin + pdirY * cos;
            const offPred = predictTrajectory(cat.x, cat.y, odx, ody, cat.energy);
            if (!offPred.hitFurniture) {
              launchCat(odx, ody);
              break;
            }
          }
        }
      }

      // 如果老鼠跑太近了，取消蓄能回去走路
      if (distToMouse < CHASE_DIST * 0.5) {
        cat.state = 'walking';
        cat.energy = 0;
      }
      break;
    }

    case 'launching': {
      // 弹射中，不能改方向
      cat.flightTimer += dt;
      const elapsed = cat.flightTimer / cat.flightTime;

      const vx = cat.launchVx * (1 - elapsed);
      const vy = cat.launchVy * (1 - elapsed);

      cat.x += vx * dt;
      cat.y += vy * dt;

      // 碰墙反弹
      let hitWall = false;
      if (cat.x - cat.r < WALL_T) {
        cat.x = WALL_T + cat.r;
        cat.launchVx = Math.abs(cat.launchVx) * WALL_BOUNCE_DECAY;
        cat.launchSpeed *= WALL_BOUNCE_DECAY; cat.bounceCount++; hitWall = true;
      }
      if (cat.x + cat.r > MAP_W - WALL_T) {
        cat.x = MAP_W - WALL_T - cat.r;
        cat.launchVx = -Math.abs(cat.launchVx) * WALL_BOUNCE_DECAY;
        cat.launchSpeed *= WALL_BOUNCE_DECAY; cat.bounceCount++; hitWall = true;
      }
      if (cat.y - cat.r < WALL_T) {
        cat.y = WALL_T + cat.r;
        cat.launchVy = Math.abs(cat.launchVy) * WALL_BOUNCE_DECAY;
        cat.launchSpeed *= WALL_BOUNCE_DECAY; cat.bounceCount++; hitWall = true;
      }
      if (cat.y + cat.r > MAP_H - WALL_T) {
        cat.y = MAP_H - WALL_T - cat.r;
        cat.launchVy = -Math.abs(cat.launchVy) * WALL_BOUNCE_DECAY;
        cat.launchSpeed *= WALL_BOUNCE_DECAY; cat.bounceCount++; hitWall = true;
      }

      // 碰家具 → 眩晕
      if (checkFurnitureCollision(cat.x, cat.y, cat.r)) {
        cat.state = 'stunned';
        cat.stunTimer = STUN_DURATION;
        cat.stunCount++;
        cat.angerLevel = Math.min(ANGER_THRESHOLD, cat.stunCount);
        cat.launchSpeed = 0;
        break;
      }

      // 飞行结束 → 回到行走
      if (elapsed >= 1.0 || Math.hypot(vx, vy) < 5) {
        cat.state = 'walking';
        cat.energy = 0;
      }
      break;
    }

    case 'stunned':
      cat.stunTimer -= dt;
      if (cat.stunTimer <= 0) {
        cat.state = 'walking';
        cat.energy = 0;
      }
      break;
  }

  // 猫抓到老鼠
  if (cat.state !== 'stunned' && Math.hypot(cat.x - mouse.x, cat.y - mouse.y) < cat.r + mouse.r) {
    cat.state = 'walking';
    cat.energy = 0;
    cat.launchSpeed = 0;
    cat.flightTimer = 0;
    const edx = mouse.x - cat.x;
    const edy = mouse.y - cat.y;
    const ed = Math.hypot(edx, edy) || 1;
    mouse.x = Math.max(WALL_T + mouse.r, Math.min(MAP_W - WALL_T - mouse.r, cat.x + edx / ed * 60));
    mouse.y = Math.max(WALL_T + mouse.r, Math.min(MAP_H - WALL_T - mouse.r, cat.y + edy / ed * 60));
  }
}

function calcRequiredEnergy(distance) {
  const ratio = Math.sqrt(distance * 2 / (MAX_SPEED * MAX_TIME));
  return Math.max(MIN_LAUNCH_ENERGY, Math.min(100, ratio * 100));
}

function launchCat(dirX, dirY) {
  cat.state = 'launching';
  cat.launchSpeed = (cat.energy / 100) * MAX_SPEED;
  cat.flightTime = (cat.energy / 100) * MAX_TIME;
  cat.flightTimer = 0;
  cat.launchVx = dirX * cat.launchSpeed;
  cat.launchVy = dirY * cat.launchSpeed;
  cat.launchCount++;
  cat.walkVx = 0; cat.walkVy = 0;
}

// ============================================================
// 渲染
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function drawCircle(x, y, r, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fill();
}

function drawLine(x1, y1, x2, y2, color, width = 1, dash = []) {
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.setLineDash(dash);
  ctx.beginPath();
  ctx.moveTo(x1, y1);
  ctx.lineTo(x2, y2);
  ctx.stroke();
  ctx.setLineDash([]);
}

function render() {
  const isAngry = cat.angerLevel >= ANGER_THRESHOLD;

  // 背景
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, 0, MAP_W, MAP_H);

  // 地板
  ctx.fillStyle = '#2a2a2a';
  for (let x = 0; x < MAP_W; x += 30)
    for (let y = 0; y < MAP_H; y += 30)
      ctx.fillRect(x, y, 29, 29);

  // 墙壁
  for (const w of walls) {
    ctx.fillStyle = '#3a3a4a';
    ctx.fillRect(w.x, w.y, w.w, w.h);
    ctx.strokeStyle = '#5a5a6a';
    ctx.lineWidth = 1;
    ctx.strokeRect(w.x, w.y, w.w, w.h);
  }

  // 家具
  for (const f of furniture) {
    ctx.fillStyle = f.onWall ? '#3a3a28' : '#4a3828';
    ctx.fillRect(f.x, f.y, f.w, f.h);
    ctx.strokeStyle = f.onWall ? '#5a5a38' : '#6a5848';
    ctx.lineWidth = 2;
    ctx.strokeRect(f.x, f.y, f.w, f.h);
  }

  // 预测线 (蓄能时)
  if (showPrediction && cat.state === 'charging') {
    const pdx = mouse.x - cat.x;
    const pdy = mouse.y - cat.y;
    const pdist = Math.hypot(pdx, pdy);
    if (pdist > 0) {
      const dirX = pdx / pdist, dirY = pdy / pdist;
      const pred = predictTrajectory(cat.x, cat.y, dirX, dirY, cat.energy);
      for (let i = 1; i < pred.points.length; i++) {
        drawLine(pred.points[i-1].x, pred.points[i-1].y, pred.points[i].x, pred.points[i].y,
          isAngry ? '#ff444488' : (pred.hitFurniture ? '#e05353' : '#f0a05088'), 1, [4, 4]);
      }
    }
  }

  // 蓄能光晕
  if (cat.state === 'charging') {
    const pulse = 0.5 + 0.5 * Math.sin(gameTime * 8);
    drawCircle(cat.x, cat.y, cat.r + 4 + pulse * 3, isAngry ? '#ff333333' : '#ffaa0033');
  }

  // 猫
  if (cat.state === 'stunned') {
    drawCircle(cat.x, cat.y, cat.r + 4, '#e0535333');
    const starAngles = [0, 72, 144, 216, 288];
    const phase = (cat.stunTimer * 10) % 1;
    for (const a of starAngles) {
      const rad = (a + phase * 72) * Math.PI / 180;
      const sx = cat.x + Math.cos(rad) * cat.r * 0.8;
      const sy = cat.y + Math.sin(rad) * cat.r * 0.8;
      ctx.fillStyle = '#ff0';
      ctx.font = '10px sans-serif';
      ctx.fillText('★', sx - 5, sy + 4);
    }
  }

  if (isAngry) {
    const pulse = 0.5 + 0.5 * Math.sin(gameTime * 10);
    drawCircle(cat.x, cat.y, cat.r + 5 + pulse * 5, '#ff333333');
  }

  const catColor = isAngry ? '#ff3333' : (cat.state === 'stunned' ? '#e05353' : '#f0a050');
  drawCircle(cat.x, cat.y, cat.r, catColor);

  // 猫眼睛
  let eyeDir;
  if (cat.state === 'launching') {
    eyeDir = { x: cat.launchVx, y: cat.launchVy };
  } else if (cat.state === 'walking') {
    eyeDir = { x: cat.walkVx, y: cat.walkVy };
  } else {
    eyeDir = { x: mouse.x - cat.x, y: mouse.y - cat.y };
  }
  const ed = Math.hypot(eyeDir.x, eyeDir.y) || 1;
  const ex = eyeDir.x / ed * 3, ey = eyeDir.y / ed * 3;
  drawCircle(cat.x - 3 + ex, cat.y - 2 + ey, 2, '#fff');
  drawCircle(cat.x + 3 + ex, cat.y - 2 + ey, 2, '#fff');
  drawCircle(cat.x - 3 + ex * 1.5, cat.y - 2 + ey * 1.5, 1, isAngry ? '#f00' : '#111');
  drawCircle(cat.x + 3 + ex * 1.5, cat.y - 2 + ey * 1.5, 1, isAngry ? '#f00' : '#111');

  // 能量槽
  const barW = cat.r * 2.5;
  const barH = 4;
  const barX = cat.x - barW / 2;
  const barY = cat.y - cat.r - 10;
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(barX, barY, barW, barH);
  const fillW = barW * (cat.energy / 100);
  const energyColor = isAngry ? '#ff3333' : (cat.energy < 30 ? '#f0a050' : cat.energy < 70 ? '#f08030' : '#e05330');
  ctx.fillStyle = energyColor;
  ctx.fillRect(barX, barY, fillW, barH);
  ctx.strokeStyle = '#555';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, barH);

  if (cat.state === 'charging') {
    ctx.fillStyle = '#fff';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(Math.round(cat.energy) + '%', cat.x, barY - 2);
  }

  // 老鼠
  drawCircle(mouse.x, mouse.y, mouse.r, '#4ade80');
  drawCircle(mouse.x - 2, mouse.y - 1, 1.5, '#fff');
  drawCircle(mouse.x + 2, mouse.y - 1, 1.5, '#fff');
  drawCircle(mouse.x - 2, mouse.y - 1, 0.8, '#111');
  drawCircle(mouse.x + 2, mouse.y - 1, 0.8, '#111');

  // 状态文字
  if (cat.state === 'walking') {
    ctx.fillStyle = isAngry ? '#ff4444' : '#f0a050';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isAngry ? '愤怒追猎!' : '行走...', cat.x, cat.y - cat.r - 16);
  } else if (cat.state === 'charging') {
    ctx.fillStyle = isAngry ? '#ff4444' : '#ffaa00';
    ctx.font = '12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isAngry ? '愤怒蓄能! ' + Math.round(cat.energy) + '%' : '蓄能中! ' + Math.round(cat.energy) + '%', cat.x, cat.y - cat.r - 16);
  } else if (cat.state === 'stunned') {
    ctx.fillStyle = '#e05353';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('眩晕! ' + cat.stunTimer.toFixed(1) + 's', cat.x, cat.y - cat.r - 16);
  } else if (cat.state === 'launching') {
    ctx.fillStyle = isAngry ? '#ff4444' : '#f0a050';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(isAngry ? '愤怒弹射!' : '弹射中!', cat.x, cat.y - cat.r - 16);
  }
}

// ============================================================
// UI 更新
// ============================================================
function updateUI() {
  const isAngry = cat.angerLevel >= ANGER_THRESHOLD;
  const stateMap = { walking: '行走追猎', charging: '原地蓄能', launching: '弹射中', stunned: '眩晕' };
  document.getElementById('catState').textContent = stateMap[cat.state] || cat.state;

  let special = '-';
  if (isAngry) special = '愤怒模式';
  else if (cat.state === 'charging') special = '准备发射';
  document.getElementById('catSpecial').textContent = special;

  document.getElementById('angerLevel').textContent = cat.angerLevel + '/' + ANGER_THRESHOLD;
  const angerEl = document.getElementById('angerLevel');
  if (isAngry) angerEl.className = 'val rage';
  else if (cat.angerLevel >= 2) angerEl.className = 'val warn';
  else angerEl.className = 'val';

  document.getElementById('catEnergy').textContent = Math.round(cat.energy);
  const fill = document.getElementById('energyFill');
  fill.style.width = cat.energy + '%';
  if (isAngry) fill.style.background = '#ff3333';
  else if (cat.energy < 30) fill.style.background = '#f0a050';
  else if (cat.energy < 70) fill.style.background = '#f08030';
  else fill.style.background = '#e05330';

  document.getElementById('launchDist').textContent = Math.round(calcLaunchDistance(cat.energy, isAngry)) + ' px';
  document.getElementById('actualDist').textContent = Math.round(Math.hypot(mouse.x - cat.x, mouse.y - cat.y)) + ' px';
  document.getElementById('launchCount').textContent = cat.launchCount;
  document.getElementById('bounceCount').textContent = cat.bounceCount;
  document.getElementById('stunCount').textContent = cat.stunCount;
}

// ============================================================
// 主循环
// ============================================================
function gameLoop(timestamp) {
  let dt = (timestamp - lastTime) / 1000;
  if (dt <= 0) dt = 0.016;
  if (dt > 0.1) dt = 0.1;
  lastTime = timestamp;
  gameTime += dt;

  if (keys[' ']) { keys[' '] = false; resetGame(); }
  if (keys['p']) { keys['p'] = false; showPrediction = !showPrediction; }

  // 老鼠移动
  let mx = 0, my = 0;
  if (keys['w'] || keys['arrowup']) my = -1;
  if (keys['s'] || keys['arrowdown']) my = 1;
  if (keys['a'] || keys['arrowleft']) mx = -1;
  if (keys['d'] || keys['arrowright']) mx = 1;
  if (mx !== 0 && my !== 0) { mx *= 0.707; my *= 0.707; }
  mouse.vx = mx * MOUSE_SPEED;
  mouse.vy = my * MOUSE_SPEED;
  let newX = mouse.x + mouse.vx * dt;
  let newY = mouse.y + mouse.vy * dt;
  newX = Math.max(WALL_T + mouse.r, Math.min(MAP_W - WALL_T - mouse.r, newX));
  newY = Math.max(WALL_T + mouse.r, Math.min(MAP_H - WALL_T - mouse.r, newY));
  if (!checkFurnitureCollision(newX, mouse.y, mouse.r)) mouse.x = newX;
  if (!checkFurnitureCollision(mouse.x, newY, mouse.r)) mouse.y = newY;

  // 猫更新
  updateCat(dt);

  render();
  updateUI();
  requestAnimationFrame(gameLoop);
}

// ============================================================
// 重置
// ============================================================
function resetGame() {
  mouse = { x: MAP_W / 2, y: MAP_H / 2 - 60, r: MOUSE_R, vx: 0, vy: 0 };
  cat = {
    x: MAP_W / 2, y: MAP_H - 50, r: CAT_R,
    state: 'walking', energy: 0,
    walkVx: 0, walkVy: 0,
    launchVx: 0, launchVy: 0,
    launchSpeed: 0, flightTime: 0, flightTimer: 0,
    stunTimer: 0,
    bounceCount: 0, stunCount: 0, launchCount: 0,
    angerLevel: 0,
  };
  spawnFurniture();
}

spawnFurniture();
lastTime = performance.now();
requestAnimationFrame(gameLoop);
</script>
